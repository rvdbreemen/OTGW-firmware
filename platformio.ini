; PlatformIO configuration for OTGW-firmware
; Supports both ESP8266 (current Nodoshop board) and ESP32 (future board)
;
; Build commands:
;   pio run -e esp8266          # Build for ESP8266 (Wemos D1 mini)
;   pio run -e esp32            # Build for ESP32
;   pio run                     # Build all targets
;   pio run -e esp8266 -t upload  # Upload to ESP8266

[platformio]
src_dir = src/OTGW-firmware
data_dir = src/OTGW-firmware/data
default_envs = esp8266

; --- Shared settings --------------------------------------------------------
[env]
framework = arduino
lib_extra_dirs = src/libraries
monitor_speed = 9600
board_build.filesystem = littlefs
extra_scripts = pre:scripts/platformio_version.py

lib_deps =
  WiFiManager @ 2.0.17
  PubSubClient @ 2.8.0
  TelnetStream @ 1.3.0
  NetApiHelpers @ 1.0.2
  AceCommon @ 1.6.2
  AceSorting @ 1.0.0
  AceTime @ 2.0.1
  OneWire @ 2.3.8
  DallasTemperature @ 4.0.6
  WebSockets @ 2.3.6

build_flags =
  -DNO_GLOBAL_HTTPUPDATE

; --- ESP8266 (current Nodoshop OTGW board) ----------------------------------
[env:esp8266]
platform = espressif8266@4.2.1
board = d1_mini
board_build.f_cpu = 160000000L
board_build.flash_mode = dio
board_build.ldscript = eagle.flash.4m2m.ld

build_flags =
  ${env.build_flags}
  -DBOARD_NODOSHOP_ESP8266

upload_speed = 460800

; --- ESP32 (future Nodoshop OTGW board) -------------------------------------
[env:esp32]
platform = espressif32@6.9.0
board = esp32dev
board_build.f_cpu = 240000000L

build_flags =
  ${env.build_flags}
  -DBOARD_NODOSHOP_ESP32

upload_speed = 921600

; ESP32 partition table: OTA-capable with 2x 1.5MB app + 768KB LittleFS
; Supports safe OTA rollback if an update fails
board_build.partitions = partitions_otgw_esp32.csv
