; PlatformIO configuration for OTGW-firmware
; Supports both ESP8266 (current Nodoshop board) and ESP32 (future board)
;
; Build commands:
;   pio run -e esp8266          # Build for ESP8266 (Wemos D1 mini)
;   pio run -e esp32            # Build for ESP32
;   pio run                     # Build all targets
;   pio run -e esp8266 -t upload  # Upload to ESP8266

[platformio]
src_dir = src/OTGW-firmware
data_dir = src/OTGW-firmware/data
default_envs = esp8266

; --- Shared settings --------------------------------------------------------
[env]
framework = arduino
lib_extra_dirs = src/libraries
monitor_speed = 9600
board_build.filesystem = littlefs
extra_scripts =
  pre:scripts/platformio_version.py
  pre:scripts/patch_pio_libs.py
; Incremental builds are automatic via .pio/build/ object caching (PlatformIO default)

lib_deps =
  WiFiManager @ 2.0.17
  PubSubClient @ 2.8.0
  TelnetStream @ 1.3.0
  NetApiHelpers @ 1.0.2
  AceCommon @ 1.6.2
  AceSorting @ 1.0.0
  ; AceTime 2.0.1 is not on the PlatformIO registry (only 4.x is); pin via GitHub tag
  https://github.com/bxparks/AceTime.git#v2.0.1
  OneWire @ 2.3.8
  DallasTemperature @ 4.0.6
  WebSockets @ 2.3.6
  ; SSD1306Ascii: text-only SSD1306 OLED driver, ~1KB lighter than Adafruit_SSD1306.
  ; Used by OLED.ino under #if HAS_OLED_CAPABLE (currently OTGW32 / ESP32 only).
  greiman/SSD1306Ascii @ 1.3.5

build_flags =
  -DNO_GLOBAL_HTTPUPDATE

; --- ESP8266 (current Nodoshop OTGW board) ----------------------------------
[env:esp8266]
; Use espressif8266@2.6.3 (Arduino Core 2.7.4 LTS, GCC 4.8.2).
; Rolled back from espressif8266@4.2.1 (Core 3.1.2) after field reports of
; OTA-reboot stalls traced to Arduino Core 3.1.0 breaking changes
; (PR esp8266/Arduino#8598 removed the implicit WiFiClient/WiFiUDP::stopAll()
; that used to run as part of the Update path). Core 2.7.4 is the proven LTS
; baseline that the 1.3.x line used; the 1.5.x/2.0.0 lines revert to it for
; ESP8266 stability. ESP32 env is unaffected and stays on the pioarduino fork.
;
; Trade-off vs 4.2.1: GCC 4.8.2 instead of GCC 10.3. The older toolchain is
; stricter about ctags-generated forward declarations — it preserves unknown
; type names rather than substituting 'int'. The OTDirect stub -D flags below
; handle this for the known types; if a new ctags-related failure appears,
; add a matching -D type=int flag here.
;
; scripts/patch_pio_libs.py patches NetApiHelpers 1.0.2 ArduinoWiFiServer.h
; for Core 3.x compatibility; on Core 2.7.4 the guard is already satisfied so
; the patch becomes a no-op but remains safe to run.
platform = espressif8266@2.6.3
board = d1_mini
board_build.f_cpu = 160000000L
board_build.flash_mode = dio
board_build.ldscript = eagle.flash.4m2m.ld

build_flags =
  ${env.build_flags}
  -DBOARD_NODOSHOP_ESP8266
  ; API_WORD_LEN is #defined inside restAPI.ino. ctags generates forward
  ; declarations for handleOTDirect (restAPI.ino, inside #if HAS_DIRECT_OT)
  ; that reference API_WORD_LEN. Since ctags forward-decls appear before the
  ; .ino content is compiled, API_WORD_LEN is not yet defined. Providing it
  ; as a build flag makes it available from the start.
  -DAPI_WORD_LEN=32
  ; PlatformIO's ctags scans ALL .ino files (including those excluded by build_src_filter)
  ; and generates forward declarations for every function — including static ones.
  ; For ESP8266, OTDirect.ino is excluded from compilation but ctags still processes it,
  ; generating forward declarations that reference OTDirect-specific enum types
  ; (OpenThermResponseStatus, OTDirectMode, OTDirectRequestOrigin). These types are only
  ; defined inside #if HAS_DIRECT_OT in OTGW-firmware.h and therefore unknown when
  ; the ctags block is compiled (before any #include). Defining them as int via -D flags
  ; makes the ctags-generated forward declarations valid; the actual OTDirect code that
  ; uses these as real enum classes is never compiled on ESP8266 anyway.
  -DOpenThermResponseStatus=int
  -DOTDirectMode=int
  -DOTDirectRequestOrigin=int
  ; ctags generates 'static' forward declarations for ~40 platform-conditional helpers
  ; that are never compiled on ESP8266 (OTDirect, Ethernet, OLED, ledc LED init) — all
  ; guarded by HAS_DIRECT_OT / HAS_ETH_CAPABLE / HAS_OLED_CAPABLE / BOARD_NODOSHOP_ESP32.
  ; GCC fires "declared 'static' but never defined [-Wunused-function]" for each one.
  ; These are pure build-pipeline artifacts; the same code compiles and runs on ESP32.
  ; Suppressing the warning class on ESP8266 only is safe: real unused-function bugs
  ; in shared code are caught by the ESP32 build where the functions are actually compiled.
  -Wno-unused-function

; OpenTherm library is only used by OTDirect.ino which is guarded with
; #if HAS_DIRECT_OT. PlatformIO's LDF scanner ignores #if guards and would
; compile OpenTherm.cpp for ESP8266 too, causing build errors. Explicitly
; exclude it here since ESP8266 never needs it at runtime.
lib_ignore = OpenTherm Library

; OTDirect.ino is guarded with #if HAS_DIRECT_OT and must be excluded from
; the ESP8266 sketch merge (otherwise OTDirect code referencing ESP32-only
; hardware would be compiled in). Note: build_src_filter does NOT prevent
; ctags from scanning excluded files — OTDirect types are handled via -D flags above.
build_src_filter = +<*> -<OTDirect.ino>

upload_speed = 460800

; --- ESP32-S3 (Nodoshop OTGW32) ---------------------------------------------
[env:esp32]
; pioarduino fork of espressif32: ships Arduino-ESP32 v3.3.5 (Network.h, ETH, etc.)
; Required by EthernetESP32 library which depends on Network.h from Arduino-ESP32 v3.x.
; Standard espressif32@6.13.0 still bundles Arduino-ESP32 v2.0.17 which lacks Network.h.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
; Nodoshop OTGW32 uses an ESP32-S3 module with 4 MB flash.
; esp32-s3-devkitc-1 is the nearest generic board; flash size is overridden below.
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 4MB
board_build.flash_mode = qio
; Override the board's default 8MB upload size — OTGW32 has 4MB flash
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304

; Use the pioarduino-supplied esptoolpy-v5.1.0 (supports --chip esp32s3).
; Earlier versions pinned ~1.30000.0 (v3.0) to bypass the IDF tools installer,
; but v3.0 lacks esp32s3 support. v5.1 is a self-contained zip from pioarduino's
; registry and does not require the IDF installer when building via PlatformIO
; on Windows (the MSYS/MinGW restriction no longer applies in this build setup).
platform_packages =

build_flags =
  ${env.build_flags}
  -DBOARD_NODOSHOP_ESP32
  ; API_WORD_LEN is #defined inside restAPI.ino. ctags generates forward
  ; declarations for handleOTDirect (restAPI.ino, inside #if HAS_DIRECT_OT)
  ; that reference API_WORD_LEN. Providing it as a build flag makes it
  ; available before the ctags block is compiled.
  -DAPI_WORD_LEN=32
  ; PlatformIO's ctags scans ALL .ino files regardless of #if guards and generates
  ; forward declarations for every function — including those inside #if HAS_PIC blocks.
  ; On ESP32 (HAS_PIC=0), OTGWSerial.h is never included, so OTGWFirmware (an enum
  ; type used as parameter in fwreportinfo()) is unknown at ctags forward-decl time.
  ; Defining it as int makes the ctags forward declaration compile; the actual
  ; fwreportinfo() body is inside #if HAS_PIC and is never compiled on ESP32.
  ; OTGWSerial is excluded via lib_ignore below so the -D flag never hits the real
  ; typedef enum OTGWFirmware definition in OTGWSerial.h.
  -DOTGWFirmware=int
  ; TASK-696: link-time optimization. Reclaims ~5–10 % of flash by inlining
  ; cross-TU calls and dead-stripping unreferenced static helpers. Needed
  ; because the OTGW32 ESP32-S3 app partition is 1.875 MB and the feature
  ; ported in TASK-690..695 ran the build to 100.2 %.
  -flto
build_unflags =
  ; Override the default -fno-lto that espressif32's framework script injects
  ; for Arduino-ESP32. Without this, the -flto above is silently dropped.
  -fno-lto

lib_deps =
  ${env.lib_deps}
  ; EthernetESP32: W5500 SPI Ethernet support for ESP32 (used by Ethernet.ino)
  networking-for-arduino/EthernetESP32 @ 1.0.2
  ; NimBLE-Arduino: lightweight BLE host stack used by SATble.ino. Replaces the
  ; classic Bluedroid <BLEDevice.h> family (~700 KB flash) with NimBLE (~250 KB
  ; flash) on ESP32-S3. ADR-092 covers driver, alternatives considered, and
  ; the one-way migration rationale. Pinned to ^2.1.0 (latest 2.x line);
  ; a future major bump (3.x) requires a new ADR.
  h2zero/NimBLE-Arduino @ ^2.1.0

; OTGWSerial is a PIC-only library (HAS_PIC=0 on ESP32). PlatformIO's LDF scanner
; ignores #if guards and would compile OTGWSerial.cpp for ESP32 too, causing errors
; when -DOTGWFirmware=int is applied to the typedef enum in OTGWSerial.h.
; Excluding it here mirrors the ESP8266 treatment of the OpenTherm library.
lib_ignore = OTGWSerial

upload_speed = 921600

; ESP32 partition table: OTA-capable with 2x 1.5MB app + 768KB LittleFS
; Supports safe OTA rollback if an update fails
board_build.partitions = partitions_otgw_esp32.csv

; --- ESP32-S3 CLASSIC (LOLIN S3 Mini in the OTGW Classic D1-mini socket) -----
; Fixed compile-time PIC gateway on ESP32-S3 — no OTDirect, no runtime hardware
; detection (supersedes the ADR-125 combo experiment). Inherits platform/board/
; partitions/lib_deps/build_unflags from [env:esp32] via extends.
[env:esp32-classic]
extends = env:esp32
build_flags =
  ${env.build_flags}
  ; Classic-socket pin map + HAS_PIC=1 / HAS_DIRECT_OT=0 (boards.h).
  -DBOARD_NODOSHOP_ESP32_CLASSIC
  -DAPI_WORD_LEN=32
  ; NO -DOTGWFirmware=int here: this build includes OTGWSerial.h (HAS_PIC=1),
  ; so the real `typedef enum OTGWFirmware` is defined; the stub would shadow it.
  ; OTDirect.ino is excluded (build_src_filter below) but ctags still scans it
  ; and emits forward declarations using OTDirect-only enum types. Stub them as
  ; int, exactly like the ESP8266 (PIC) env does.
  -DOpenThermResponseStatus=int
  -DOTDirectMode=int
  -DOTDirectRequestOrigin=int
  ; ctags emits static forward-decls for helpers that are never compiled here
  ; (OTDirect, Ethernet, OTGW32 ledc LED init) — silence the resulting
  ; -Wunused-function noise; the esp32 env still compiles those for real.
  -Wno-unused-function
  ; Route the Arduino console (log_e, Serial) to the S3 native USB-Serial-JTAG
  ; port. Without this the default console is UART0 on GPIO43/44 — which on the
  ; Classic socket are PIN_PIC_TX/PIN_PIC_RX, so boot diagnostics would be
  ; transmitted into the PIC instead of being visible over USB (TASK-850).
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -flto
; PIC build: keep OTGWSerial, exclude the OpenTherm (OTDirect) library —
; mirrors the ESP8266 env. Overrides `lib_ignore = OTGWSerial` from [env:esp32].
lib_ignore = OpenTherm Library
; OTDirect.ino is guarded with #if HAS_DIRECT_OT and must be excluded from the
; sketch merge, same as on ESP8266.
build_src_filter = +<*> -<OTDirect.ino>
