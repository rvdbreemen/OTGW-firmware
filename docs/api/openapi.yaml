      operationId: sendOTGWCommandAliasPut
      parameters:
        - name: command
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Command queued for processing
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/autoconfigure:
