openapi: 3.0.3
info:
  title: OTGW-firmware REST API
  description: |
    REST API for the OpenTherm Gateway (OTGW) firmware running on ESP8266.

    This API provides access to OpenTherm data, device information, settings,
    and control commands for the OpenTherm Gateway hardware.

    **Base URL**: `http://{device-ip}/api`

    **API Version**: v2. Earlier versions (v0, v1) have been removed and return 410 Gone.

    **Authentication**: None (device should be on trusted local network only)

    **Content-Type**: All responses are `application/json`

    **API Design** (ADR-035):
    - All error responses return structured JSON: `{"error":{"status":N,"message":"..."}}`
    - Queued operations return 202 Accepted
    - RESTful resource endpoints: `/otgw/messages/{id}`, `/otgw/commands`, `/otgw/discovery`
    - Consistent CORS headers on all responses
    - **OPTIONS preflight support** for all v2 endpoints (returns 204 with CORS headers)
    - **Allow header** on all 405 responses per RFC 7231 §6.5.5
  version: 2.0.0
  contact:
    name: Robert van den Breemen
    url: https://github.com/rvdbreemen/OTGW-firmware
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://{device-ip}/api
    description: Local OTGW device
    variables:
      device-ip:
        default: otgw.local
        description: IP address or hostname of the OTGW device

tags:
  - name: Health
    description: Device health and status checks
  - name: Device Info
    description: Device information and system status
  - name: Settings
    description: Device configuration and settings
  - name: OpenTherm Data
    description: Access OpenTherm message data
  - name: OTGW Commands
    description: Send commands to the OpenTherm Gateway
  - name: Flash/Upgrade
    description: Firmware upgrade status and operations
  - name: Sensors
    description: Dallas temperature sensor label management
  - name: Filesystem
    description: Filesystem and firmware file listing

paths:
  /v2/health:
    get:
      tags:
        - Health
      summary: Get device health status
      description: |
        Returns the current health status of the device including uptime,
        heap memory, connectivity status, and filesystem status.

        **Side effect**: Each call writes a small probe file (`/.health`) to LittleFS
        to verify the filesystem is writable (not just mounted). This incurs a flash
        write on every request. Do not poll this endpoint at high frequency from
        external monitoring tools — use 30-60 second intervals at minimum.
        The intended use-case is post-OTA boot detection, where polling stops
        immediately once `status: UP` is received.
      operationId: getHealth
      responses:
        '200':
          description: Health status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  health:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [UP, DEGRADED]
                      uptime:
                        type: string
                        example: "2d 3h 45m"
                      heap:
                        type: integer
                        description: Free heap memory in bytes
                      wifirssi:
                        type: integer
                        description: WiFi signal strength in dBm
                      mqttconnected:
                        type: string
                        enum: ["true", "false"]
                      otgwconnected:
                        type: string
                        enum: ["true", "false"]
                      littlefsMounted:
                        type: string
                        enum: ["true", "false"]
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/settings:
    get:
      tags:
        - Settings
      summary: Get device settings
      description: Retrieve all device configuration settings as a JSON object.
      operationId: getSettings
      responses:
        '200':
          description: Settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      tags:
        - Settings
      summary: Update device settings
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                value: {}
      responses:
        '200':
          description: Settings updated successfully
        '400':
          $ref: '#/components/responses/BadRequestJson'

  /v2/sensors/labels:
    get:
      tags:
        - Sensors
      summary: Get all Dallas sensor labels
      description: |
        Returns all configured Dallas temperature sensor labels.
        Each sensor is identified by its 1-Wire address and has a user-defined label.
      operationId: getAllDallasLabels
      responses:
        '200':
          description: Labels retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      tags:
        - Sensors
      summary: Update all Dallas sensor labels
      description: |
        Update all Dallas temperature sensor labels. Provide a JSON object
        mapping sensor addresses to their new labels.
      operationId: updateAllDallasLabels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '200':
          description: Labels updated successfully
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/device/info:
    get:
      tags:
        - Device Info
      summary: Get comprehensive device information
      description: |
        Returns device information as a flat JSON object (map format).

        Includes firmware version, PIC details, network info, memory,
        connectivity status, and gateway mode.
      operationId: getDeviceInfo
      responses:
        '200':
          description: Device information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  device:
                    type: object
                    properties:
                      author:
                        type: string
                      fwversion:
                        type: string
                      picavailable:
                        type: boolean
                      picfwversion:
                        type: string
                      picdeviceid:
                        type: string
                      picfwtype:
                        type: string
                      hostname:
                        type: string
                      ipaddress:
                        type: string
                      freeheap:
                        type: integer
                      gatewaymode:
                        type: boolean
                      mqttconnected:
                        type: boolean
                      otgwconnected:
                        type: boolean
              examples:
                example:
                  value:
                    device:
                      author: "Robert van den Breemen"
                      fwversion: "1.2.0"
                      picavailable: true
                      hostname: "OTGW"
                      ipaddress: "192.168.1.100"
                      freeheap: 25600
                      gatewaymode: true
                      mqttconnected: true
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/device/time:
    get:
      tags:
        - Device Info
      summary: Get device date/time
      description: Returns the current device date and time.
      operationId: getDeviceTime
      responses:
        '200':
          description: Device time retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  devtime:
                    type: object
                    properties:
                      dateTime:
                        type: string
                        example: "2026-02-16 10:30:00"
                      epoch:
                        type: integer
                        example: 1739702200
                      message:
                        type: string
                      psmode:
                        type: boolean
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/flash/status:
    get:
      tags:
        - Flash/Upgrade
      summary: Get unified flash status
      description: Returns flash status for both ESP8266 and PIC firmware upgrades.
      operationId: getFlashStatus
      responses:
        '200':
          description: Flash status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  flashstatus:
                    type: object
                    properties:
                      flashing:
                        type: boolean
                      pic_flashing:
                        type: boolean
                      pic_progress:
                        type: integer
                        minimum: 0
                        maximum: 100
                      pic_filename:
                        type: string
                      pic_error:
                        type: string
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/pic/flash-status:
    get:
      tags:
        - Flash/Upgrade
      summary: Get PIC flash status
      description: Minimal endpoint for polling PIC flash state during upgrade.
      operationId: getPICFlashStatus
      responses:
        '200':
          description: PIC flash status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  flashstatus:
                    type: object
                    properties:
                      flashing:
                        type: boolean
                      progress:
                        type: integer
                      filename:
                        type: string
                      error:
                        type: string
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/pic/update-check:
    get:
      tags:
        - Flash/Upgrade
      summary: Check for PIC firmware updates
      description: Returns whether a PIC firmware update is available.
      operationId: getPICUpdateCheck
      responses:
        '200':
          description: Update check result
          content:
            application/json:
              schema:
                type: object
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/firmware/files:
    get:
      tags:
        - Filesystem
      summary: List PIC firmware files
      description: Returns list of available PIC firmware files on the filesystem.
      operationId: getFirmwareFiles
      responses:
        '200':
          description: Firmware file list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    size:
                      type: integer
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/filesystem/files:
    get:
      tags:
        - Filesystem
      summary: List filesystem files
      description: Returns list of files on the LittleFS filesystem.
      operationId: getFilesystemFiles
      responses:
        '200':
          description: File list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    size:
                      type: integer
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/filesystem/hash-check:
    get:
      tags:
        - Filesystem
      summary: Check firmware/filesystem version match
      description: |
        Returns the firmware git hash and filesystem git hash.
        Used to detect mismatches between firmware and filesystem (e.g. after
        a firmware-only OTA update without flashing the new LittleFS image).
      operationId: getFilesystemHashCheck
      responses:
        '200':
          description: Hash check result
          content:
            application/json:
              schema:
                type: object
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/otmonitor:
    get:
      tags:
        - OpenTherm Data
      summary: Get all OpenTherm data
      description: |
        Returns all available OpenTherm data. Includes temperatures, status flags,
        pressures, and sensor data.
      operationId: getOTmonitor
      responses:
        '200':
          description: OTmonitor data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                description: OpenTherm data structure
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/telegraf:
    get:
      tags:
        - OpenTherm Data
      summary: Get OpenTherm data in Telegraf format
      description: Returns all OpenTherm data in a format optimized for Telegraf monitoring system integration.
      operationId: getTelegraf
      responses:
        '200':
          description: Telegraf data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                description: OpenTherm data in Telegraf format
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/messages/{msgid}:
    get:
      tags:
        - OpenTherm Data
      summary: Get OpenTherm message by ID
      description: Retrieve the current value for an OpenTherm message by its numeric ID (0-127).
      operationId: getOTGWMessage
      parameters:
        - name: msgid
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 127
      responses:
        '200':
          description: Message value retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  label:
                    type: string
                  value: {}
                  unit:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/commands:
    post:
      tags:
        - OTGW Commands
      summary: Send command to OpenTherm Gateway
      description: |
        Send a command to the OpenTherm Gateway. The command is provided in the
        JSON request body. Returns 202 Accepted because the command is queued
        for asynchronous processing.
      operationId: sendOTGWCommand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  pattern: '^[A-Z]{2}=.+$'
                  description: OTGW command in format XX=value
            example:
              command: "TT=20.5"
      responses:
        '202':
          description: Command queued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [queued]
              example:
                status: "queued"
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '413':
          description: Command too long
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/otgw/discovery:
    post:
      tags:
        - OTGW Commands
      summary: Trigger MQTT autodiscovery
      description: |
        Sends all MQTT autodiscovery topics for Home Assistant integration.
        Use this to register or re-register all entities with Home Assistant.
        Returns 202 Accepted because discovery messages are sent asynchronously.
      operationId: triggerDiscovery
      responses:
        '202':
          description: Discovery accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [accepted]
              example:
                status: "accepted"
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/webhook/test:
    get:
      tags:
        - OTGW Commands
      summary: Test webhook delivery
      description: |
        Triggers a test webhook call to verify the configured webhook URL is reachable.
        Only functional when webhook is enabled in settings.
      operationId: testWebhook
      responses:
        '200':
          description: Webhook test result
          content:
            application/json:
              schema:
                type: object
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  # --- backward-compatibility aliases (prefer primary endpoints above) ---

  /v2/otgw/id/{msgid}:
    get:
      tags:
        - OpenTherm Data
      summary: Get OpenTherm message by ID (alias)
      description: |
        Alias for `/v2/otgw/messages/{msgid}`.
        **Prefer** `/v2/otgw/messages/{msgid}` for new integrations.
      operationId: getOTGWValueByIdAlias
      parameters:
        - name: msgid
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 127
      responses:
        '200':
          description: Message value retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/label/{msglabel}:
    get:
      tags:
        - OpenTherm Data
      summary: Get OpenTherm message by label
      description: Retrieve the current value for an OpenTherm message using its human-readable label.
      operationId: getOTGWLabel
      parameters:
        - name: msglabel
          in: path
          required: true
          schema:
            type: string
          example: "boilertemperature"
      responses:
        '200':
          description: Message value retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/command/{command}:
    post:
      tags:
        - OTGW Commands
      summary: Send OTGW command via URL path (alias)
      description: |
        Alias for `/v2/otgw/commands`.
        **Prefer** `/v2/otgw/commands` (JSON body) for new integrations.
        Returns 202 Accepted.
      operationId: sendOTGWCommandAlias
      parameters:
        - name: command
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Z]{2}=.+$'
          example: "TT=20.5"
      responses:
        '202':
          description: Command queued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [queued]
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '413':
          description: Command too long
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/otgw/autoconfigure:
    post:
      tags:
        - OTGW Commands
      summary: Trigger MQTT autodiscovery (alias)
      description: |
        Alias for `/v2/otgw/discovery`.
        **Prefer** `/v2/otgw/discovery` for new integrations.
        Returns 202 Accepted.
      operationId: autoConfigureAlias
      responses:
        '202':
          description: Discovery accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [accepted]
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

components:
  schemas:
    ApiError:
      type: object
      description: Standard API error response (ADR-035)
      properties:
        error:
          type: object
          properties:
            status:
              type: integer
              description: HTTP status code
            message:
              type: string
              description: Human-readable error message
          required:
            - status
            - message
      example:
        error:
          status: 400
          message: "Invalid message ID"

  responses:
    BadRequestJson:
      description: Bad request - invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 400
              message: "Invalid or missing message ID"

    MethodNotAllowedJson:
      description: |
        HTTP method not allowed.
        Includes `Allow` header listing valid methods per RFC 7231 §6.5.5.
      headers:
        Allow:
          description: Comma-separated list of valid HTTP methods for this endpoint
          schema:
            type: string
            example: "GET"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 405
              message: "Method not allowed"

    NotFound:
      description: API endpoint not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 404
              message: "Endpoint not found"

    URITooLong:
      description: Request URI exceeds maximum length
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 414
              message: "URI too long"

    InternalServerError:
      description: Internal server error (typically low heap memory)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 500
              message: "Internal server error (low heap)"

x-api-design-notes: |
  **API Version**: v2 only. v0 and v1 have been removed and return 410 Gone.

  **Memory Constraints**:
  - ESP8266 has limited RAM (~40KB available after core libraries)
  - API enforces minimum 4KB free heap before processing requests

  **Boolean Values**:
  - `/v2/health` returns booleans as strings: "true" or "false"
  - `/v2/device/info` returns proper JSON booleans

  **Error Handling**:
  - All errors return structured JSON: {"error":{"status":N,"message":"..."}}
  - All 405 responses include an `Allow` header listing valid methods (RFC 7231 §6.5.5)
  - Low heap conditions return 500 to prevent crashes

  **CORS Support**:
  - All responses include `Access-Control-Allow-Origin: *`
  - All endpoints respond to OPTIONS preflight with 204 No Content and CORS headers
  - CORS preflight response includes `Access-Control-Max-Age: 86400` (24h cache)

  **Polling Recommendations**:
  - Health endpoint: Poll every 30-60 seconds (each call writes a probe file to LittleFS)
  - Flash status: Poll every 1-2 seconds during upgrades
  - OpenTherm data: Poll every 5-10 seconds

  **Home Assistant Integration**:
  - Use /v2/otgw/discovery to register entities
  - MQTT is the primary integration method
  - REST API provides fallback and manual control
