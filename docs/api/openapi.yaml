                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/externaloutdoor:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Push outdoor temperature from external source
      description: |
        Injects an outdoor temperature reading. Expires after sensor max age.
        Body is a plain numeric string or JSON `{"value":"8.0"}`.
      operationId: setSatExternalOutdoor
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
