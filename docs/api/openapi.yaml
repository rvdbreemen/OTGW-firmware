      description: |
        Injects an indoor temperature reading from an external sensor. The reading
        expires after the configured `sensor_max_age` (default 6 hours). Body is a
        plain numeric string or JSON `{"value":"20.8"}`.
      operationId: setSatExternalTemp
      requestBody:
