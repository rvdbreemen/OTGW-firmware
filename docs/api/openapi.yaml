  /v2/mqtt/republish:
    post:
      tags:
        - MQTT
      summary: Force full OT value republish to MQTT
      description: |
        Marks all OpenTherm values as dirty and triggers an immediate republish
        of all retained MQTT topics. Use this after a broker wipe or when you
        need to restore all MQTT retained state without waiting for the normal
        publish cadence.

        This is distinct from `/v2/discovery/republish`, which re-publishes Home
        Assistant autodiscovery configs. This endpoint re-publishes the actual
        OpenTherm measurement values.

        **Authentication**: Required when an HTTP password is configured.
      operationId: mqttRepublishAll
      security:
        - basicAuth: []
      responses:
        '200':
          description: Republish requested successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  message:
                    type: string
              example:
                status: "ok"
                message: "OT value republish requested"
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '503':
          description: MQTT is not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error:
                  status: 503
                  message: "MQTT not connected"

