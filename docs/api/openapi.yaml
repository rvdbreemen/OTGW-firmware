  # SAT (Smart Autotune Thermostat) endpoints
  /v2/sat:
    get:
      tags:
        - SAT
      summary: Get SAT status
      description: |
        Returns the full SAT runtime state. Equivalent to `GET /v2/sat/status`.
      operationId: getSatRoot
      responses:
        '200':
          description: SAT status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SatStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/status:
    get:
      tags:
        - SAT
      summary: Get SAT runtime status
      description: |
        Returns the full SAT runtime state as a flat JSON object with 132 fields
        covering control mode, setpoints, PID state, temperature sensors, cycle
        diagnostics, pressure, power, thermal model, comfort, and BLE inputs
        (schema `SatStatus`).

        Add `?detail=full` to get the compact health view instead: a SEPARATE
        22-field object (schema `SatHealth`) focused on cycle/flame/device health,
        sync flags, error statistics, pressure trend, and auto-tune progress. It is
        not a superset of the standard status.
      operationId: getSatStatus
      parameters:
        - name: detail
          in: query
          required: false
          schema:
            type: string
            enum: [full]
          description: |
            Pass `full` to get the compact `SatHealth` object instead of the
            standard `SatStatus` JSON.
      responses:
        '200':
          description: |
            SAT status retrieved successfully. Returns `SatStatus` by default, or
            `SatHealth` when `?detail=full` is supplied.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/SatStatus'
                  - $ref: '#/components/schemas/SatHealth'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/force-boiler:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Force boiler-present override (TEST/DEBUG hook)
      description: |
        **Test/debug hook — not for production use.** Asserts that a boiler is
        present so the SAT availability gate (edge auto-disable, REST 409, MQTT
        enable-reject) can be verified on the bench without real hardware
        (TASK-802). The override is transient: it lives in RAM only and is
        cleared on reboot.

        The value may be supplied in the body (`0`, `1`, `true`, `false`) or in
        the path as `/v2/sat/force-boiler/1`.
      operationId: setSatForceBoiler
      requestBody:
        required: false
        content:
          text/plain:
            schema:
              type: string
              enum: ["0", "1", "true", "false"]
              example: "1"
      responses:
        '200':
          description: Override applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  force_boiler_present:
                    type: boolean
              example:
                status: ok
                force_boiler_present: true
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Force boiler-present override (PUT alias)
      operationId: setSatForceBoilerPut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1force-boiler/post/requestBody'
      responses:
        '200':
          description: Override applied
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/target:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Set SAT target temperature
      description: |
        Sets the target room temperature for the SAT controller. The value is
        validated (5.0–30.0 °C) and persisted to flash.

        Body may be a plain numeric string (`"21.5"`) or a JSON object (`{"value":"21.5"}`).
      operationId: setSatTarget
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "21.5"
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  example: "21.5"
      responses:
