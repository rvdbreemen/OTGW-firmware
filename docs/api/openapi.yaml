  # SAT (Smart Autotune Thermostat) endpoints
  /v2/sat:
    get:
      tags:
        - SAT
      summary: Get SAT status
      description: |
        Returns the full SAT runtime state. Equivalent to `GET /v2/sat/status`.
      operationId: getSatRoot
      responses:
        '200':
          description: SAT status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SatStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/status:
    get:
      tags:
        - SAT
      summary: Get SAT runtime status
      description: |
        Returns the full SAT runtime state as a JSON object with ~50 fields covering
        control mode, setpoints, PID state, temperature sensors, cycle diagnostics,
        pressure, power, and safety status.

        Add `?detail=full` to get extended health diagnostics including cycle statistics,
        auto-tune state, OPV calibration phase, and pressure health details.
      operationId: getSatStatus
      parameters:
        - name: detail
          in: query
          required: false
          schema:
            type: string
            enum: [full]
          description: |
            Pass `full` to get extended health diagnostics instead of the standard status JSON.
      responses:
        '200':
          description: SAT status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SatStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/target:
    post:
      tags:
        - SAT
      summary: Set SAT target temperature
      description: |
        Sets the target room temperature for the SAT controller. The value is
        validated (5.0–30.0 °C) and persisted to flash.

        Body may be a plain numeric string (`"21.5"`) or a JSON object (`{"value":"21.5"}`).
      operationId: setSatTarget
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "21.5"
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  example: "21.5"
      responses:
        '200':
          description: Target temperature set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/externaltemp:
    post:
      tags:
        - SAT
      summary: Push indoor temperature from external sensor
      description: |
        Injects an indoor temperature reading from an external sensor. The reading
        expires after the configured `sensor_max_age` (default 6 hours). Body is a
        plain numeric string or JSON `{"value":"20.8"}`.
      operationId: setSatExternalTemp
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "20.8"
      responses:
        '200':
          description: Indoor temperature accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/externaloutdoor:
    post:
      tags:
        - SAT
      summary: Push outdoor temperature from external source
      description: |
        Injects an outdoor temperature reading. Expires after sensor max age.
        Body is a plain numeric string or JSON `{"value":"8.0"}`.
      operationId: setSatExternalOutdoor
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "8.0"
      responses:
        '200':
          description: Outdoor temperature accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/pvsurplus:
    post:
      tags:
        - SAT
      summary: Push PV-surplus power (TASK-640)
      description: |
        Injects a PV-surplus power reading in Watts. When the surplus exceeds the
        configured threshold for the hold-time and feature is enabled
        (`satpvboostenabled`), SAT applies an additive boost of
        `satpvboostdeltac` °C to the effective target. Reading expires after
        `sensor_max_age` (default 6 h). Body is a plain numeric string or JSON
        `{"value":"1800"}`. Range: 0 to 50000 W.
      operationId: setSatPvSurplus
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "1800"
      responses:
        '200':
          description: PV-surplus value accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/sim/event:
    post:
      tags:
        - SAT
      summary: Inject a simulation scenario event (TASK-797)
      description: |
        Perturbs the synthetic room model so testers can exercise SAT responses
        on a bench without real hardware. Honoured ONLY while simulation is
        active (`satsimulation` enabled); returns HTTP 409 otherwise, so it can
        never perturb a real-boiler installation.

        Supported events:
        - `window_open` — multiplies the room cooling rate for `duration_s`.
          `value` = loss multiplier (default 3, clamped 1..20).
        - `solar_gain` — additive room warming for `duration_s`.
          `value` = °C/min (default 0.5, clamped 0..5).
        - `sensor_noise` — adds ± noise to flow/return sensor reads for
          `duration_s` (TASK-799), exercising staleness/EMA paths. `value` =
          amplitude °C (default 0.5, clamped 0..5); `value` 0 turns noise off.
        - `sensor_dropout` — drops the room sensor (room read returns NAN) for
          `duration_s` (TASK-799), exercising the ghost-Tr / fallback path.
          `value` 0 with no duration cancels an active dropout.
        - `dhw_demand` — triggers a DHW draw for `duration_s` (default 120 s,
          TASK-800): forces DHW-active (flame-steal, CH suppressed) so the cycle
          classifier sees DHW/MIXED cycles. `value` 0 + no duration cancels.

        `duration_s` is optional (default 600 s; 120 s for `dhw_demand`).
        `pressure_drop` is deferred (SATpressure coupling); `pv_surplus` has its
        own `/v2/sat/pvsurplus` endpoint. Unknown/unsupported events return 400.
      operationId: injectSatSimEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  type: string
                  enum: [window_open, solar_gain, sensor_noise, sensor_dropout, dhw_demand]
                  example: window_open
                value:
                  type: number
                  example: 3
                duration_s:
                  type: integer
                  example: 600
      responses:
        '200':
          description: Scenario event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '409':
          description: Simulation inactive — enable satsimulation first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/sat/reset_integral:
    post:
      tags:
        - SAT
      summary: Reset PID integral accumulator
      description: |
        Resets the PID I-term to zero. Useful after large setpoint changes to
        prevent integral windup from causing overshoot.
      operationId: satResetIntegral
      responses:
        '200':
          description: Integral reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/flush:
    post:
      tags:
        - SAT
      summary: Flush short-lived SAT data
      description: |
        Clears short-lived SAT data including the PID integral accumulator and
        cycle statistics window. Useful after large configuration changes or
        when troubleshooting control behavior.
      operationId: satFlush
      responses:
        '200':
          description: Data flushed
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    enum: [ok]
                  flushed:
                    type: array
                    items:
                      type: string
              example:
                result: ok
                flushed: ["pid", "cycles"]
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/window:
    post:
      tags:
        - SAT
      summary: Set window open/closed state
      description: |
        Reports window open/closed state to SAT. When a window is open, SAT
        reduces the setpoint to avoid heating a ventilated room. Payload:
        `"open"`, `"closed"`, `"1"`, `"0"`, or `"ON"`.
      operationId: setSatWindow
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "open"
      responses:
        '200':
          description: Window state accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/preset:
    post:
      tags:
        - SAT
      summary: Activate a named preset
      description: |
        Switches the SAT target temperature to the configured value for the named
        preset. Valid preset names: `comfort`, `eco`, `away`, `sleep`, `activity`, `home`.
      operationId: setSatPreset
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              enum: [comfort, eco, away, sleep, activity, home]
              example: "away"
      responses:
        '200':
          description: Preset activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/enable:
    post:
      tags:
        - SAT
      summary: Enable or disable SAT controller
      description: |
        Enables or disables the SAT controller. Payload: `"1"`, `"true"`, `"on"` to enable;
        `"0"`, `"false"`, `"off"` to disable.
      operationId: setSatEnable
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "1"
      responses:
        '200':
          description: SAT enabled/disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/mode:
    post:
      tags:
        - SAT
      summary: Set SAT control mode
      description: |
        Sets the SAT control mode. Valid values: `"continuous"`, `"pwm"`, `"auto"`,
        or the numeric equivalents `"0"`, `"1"`, `"2"`.
      operationId: setSatMode
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              enum: [continuous, pwm, auto, "0", "1", "2"]
              example: "continuous"
      responses:
        '200':
          description: Control mode set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/humidity:
    post:
      tags:
        - SAT
      summary: Push indoor humidity
      description: |
        Injects an indoor humidity reading (0-100 %). Used when humidity-based comfort
        adjustment is enabled. Body is a plain numeric string or JSON `{"value":"62.5"}`.
      operationId: setSatHumidity
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "62.5"
      responses:
        '200':
          description: Humidity accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/weather:
    get:
      tags:
        - SAT
      summary: Get weather integration status
      description: |
        Returns the current weather integration status as a JSON object, including
        the last received sun elevation and outdoor temperature from the weather source.
      operationId: getSatWeather
      responses:
        '200':
          description: Weather integration status
          content:
            application/json:
              schema:
                type: object
                description: Weather integration state (fields vary by implementation)
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/area/{index}:
    post:
      tags:
        - SAT
      summary: Push area temperature for multi-area control
      description: |
        Injects a temperature reading for the specified area (0-3). When multi-area
        mode is enabled, SAT averages (or weights) the area temperatures as the room
        temperature input for the PID. Body is a plain numeric string or JSON `{"value":"21.3"}`.
      operationId: setSatAreaTemp
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 3
          description: Area index (0-3)
          example: 0
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "21.3"
      responses:
        '200':
          description: Area temperature accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/weather/needs-setup:
    get:
      tags:
        - SAT
      summary: Report whether the weather setup wizard should be shown
      description: |
        Returns whether the browser-side weather setup wizard should be
        triggered (TASK-511). Becomes `true` only after a 5-minute startup
        grace window AND when the canonical outside temperature
        (`OTcurrentSystemState.Toutside`, populated from OT MsgID 27) is
        still zero AND the SAT weather provider has not produced a valid
        reading. The `has_key` field surfaces whether an Open-Meteo /
        provider API key is already stored.
      operationId: getSatWeatherNeedsSetup
      responses:
        '200':
          description: Setup status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  needs_setup:
                    type: boolean
                  has_key:
                    type: boolean
              example:
                needs_setup: false
                has_key: true
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/discovery:
    get:
      tags:
        - SAT
      summary: BLE sensor roster (ESP32 only)
      description: |
        Streams the BLE roster as JSON (TASK-508). Each roster slot lists the
        discovered MAC, persistent label, last temperature/humidity, RSSI,
        and selection state. ESP32-only endpoint; the entire `/v2/sat/ble/*`
        family returns 404 from the SAT handler on ESP8266 builds.
      operationId: getSatBleDiscovery
      responses:
        '200':
          description: Roster retrieved successfully
          content:
            application/json:
              schema:
                type: object
                description: Roster payload as produced by `satBLERosterSendJSON()`.
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/select:
    post:
      tags:
        - SAT
      summary: Promote a roster MAC to the active BLE sensor (ESP32 only)
      description: |
        Promotes the named MAC from the roster to the active SAT BLE sensor
        slot (TASK-508). The MAC must already be present in the roster from
        a prior discovery cycle.
      operationId: setSatBleSelect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mac]
              properties:
                mac:
                  type: string
                  example: "AA:BB:CC:DD:EE:FF"
      responses:
        '200':
          description: Roster slot selected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      tags:
        - SAT
      summary: Promote a roster MAC (PUT alias)
      operationId: setSatBleSelectPut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1select/post/requestBody'
      responses:
        '200':
          description: Roster slot selected
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/label:
    post:
      tags:
        - SAT
      summary: Set the persistent label on a roster slot (ESP32 only)
      description: |
        Updates the user-visible label for the named MAC in the BLE roster
        (TASK-508). Label is persisted alongside the roster slot.
      operationId: setSatBleLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mac, label]
              properties:
                mac:
                  type: string
                  example: "AA:BB:CC:DD:EE:FF"
                label:
                  type: string
                  maxLength: 31
                  example: "Living room"
      responses:
        '200':
          description: Label updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      tags:
        - SAT
      summary: Set roster label (PUT alias)
      operationId: setSatBleLabelPut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1label/post/requestBody'
      responses:
        '200':
          description: Label updated
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/forget:
    post:
      tags:
        - SAT
      summary: Drop a roster slot and its HA discovery (ESP32 only)
      description: |
        Removes the named MAC from the BLE roster and unpublishes the matching
        Home Assistant discovery config (TASK-508). Accepts POST, PUT, or
        DELETE; the body always carries the MAC.
      operationId: forgetSatBle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mac]
              properties:
                mac:
                  type: string
                  example: "AA:BB:CC:DD:EE:FF"
      responses:
        '200':
          description: Roster slot removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      tags:
        - SAT
      summary: Drop a roster slot (PUT alias)
      operationId: forgetSatBlePut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1forget/post/requestBody'
      responses:
        '200':
          description: Roster slot removed
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    delete:
      tags:
        - SAT
      summary: Drop a roster slot (DELETE alias)
      operationId: forgetSatBleDelete
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1forget/post/requestBody'
      responses:
        '200':
          description: Roster slot removed
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/markers:
    get:
      tags:
        - SAT
      summary: List heating-curve calibration markers
      description: |
        Returns the heating-curve calibration markers persisted to
        `/sat_markers.json` (TASK-586). Each marker is an object with
        `id`, `outside_temp`, `flow_temp`, `added` (unix epoch), and
        optional `label`. Returns an empty JSON array when the file does
        not yet exist.
      operationId: listSatMarkers
      responses:
        '200':
          description: Marker list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    outside_temp:
                      type: number
                    flow_temp:
                      type: number
                    added:
                      type: integer
                      description: Unix epoch when the marker was created
                    label:
                      type: string
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      tags:
        - SAT
      summary: Add a heating-curve calibration marker
      description: |
        Appends a marker to `/sat_markers.json` (TASK-586). The store keeps
        at most 20 markers; a 409 is returned when the limit is reached. The
        new `id` is `max(existing_id) + 1`. The `added` timestamp is the
        current epoch when the marker is written.
      operationId: addSatMarker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outside_temp, flow_temp]
              properties:
                outside_temp:
                  type: number
                  minimum: -15
                  maximum: 25
                flow_temp:
                  type: number
                  minimum: 10
                  maximum: 90
                label:
                  type: string
                  maxLength: 31
      responses:
        '201':
          description: Marker created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  id:
                    type: integer
              example:
                status: ok
                id: 4
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '409':
          description: Marker store is full (20 markers maximum)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '500':
          description: Cannot write `/sat_markers.json` to LittleFS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/sat/markers/{id}:
    delete:
      tags:
        - SAT
      summary: Delete a heating-curve calibration marker
      description: |
        Removes the marker with the given numeric `id` from
        `/sat_markers.json` (TASK-586).
      operationId: deleteSatMarker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Marker removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: Marker id not found, or the markers file does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '500':
          description: Cannot write `/sat_markers.json` to LittleFS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/sat/sensor-areas:
    get:
      tags:
        - SAT
      summary: Get Dallas-to-SAT-area mapping
      description: |
        Returns the persistent mapping of Dallas 1-Wire sensor addresses to
        the four SAT area slots (TASK-587). An empty `sensor` string means
        the slot is unmapped. Addresses are 16 uppercase hex characters.
      operationId: getSatSensorAreas
      responses:
        '200':
          description: Mapping retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  areas:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                          minimum: 0
                          maximum: 3
                        sensor:
                          type: string
                          description: 16-hex-character Dallas address or empty string
              example:
                areas:
                  - index: 0
                    sensor: "28FF64D1841703F1"
                  - index: 1
                    sensor: ""
                  - index: 2
                    sensor: ""
                  - index: 3
                    sensor: ""
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    patch:
      tags:
        - SAT
      summary: Update one Dallas-to-SAT-area mapping
      description: |
        Updates one of the four mapping slots (TASK-587). The body specifies
        the slot `area` (0-3) and the Dallas sensor address. An empty string
        clears the slot. Addresses are validated as 16 hex characters and
        normalised to uppercase before persistence. Also accepts POST and
        PUT for browsers that cannot issue PATCH.
      operationId: setSatSensorArea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [area]
              properties:
                area:
                  type: integer
                  minimum: 0
                  maximum: 3
                sensor:
                  type: string
                  pattern: '^([0-9A-Fa-f]{16})?$'
                  description: 16-hex-character Dallas address, or empty string to clear the slot
      responses:
        '200':
          description: Mapping updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      tags:
        - SAT
      summary: Update one Dallas-to-SAT-area mapping (POST alias)
      operationId: setSatSensorAreaPost
      requestBody:
        $ref: '#/paths/~1v2~1sat~1sensor-areas/patch/requestBody'
      responses:
        '200':
          description: Mapping updated
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      tags:
        - SAT
      summary: Update one Dallas-to-SAT-area mapping (PUT alias)
      operationId: setSatSensorAreaPut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1sensor-areas/patch/requestBody'
      responses:
        '200':
          description: Mapping updated
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/settings/{name}:
    post:
      tags:
        - SAT
      summary: Update a SAT setting
      description: |
        Updates any named SAT setting. This mirrors all MQTT `sat/<name>` command
        handlers. The setting name corresponds to the MQTT subtopic (e.g.,
        `heating_curve`, `deadband`, `boiler_capacity`, `heating_system`,
        `overshoot_margin`, `manufacturer`, `simulation`, `auto_tune`, etc.).

        Special no-value commands (`reset_integral`, `ovp_start`, `ovp_stop`) are
        also accepted here without a body.

        See the [SAT MQTT topics reference](https://github.com/rvdbreemen/OTGW-firmware/blob/dev/backlog/docs/doc-1%20-%20sat-mqtt-topics.md)
        for the full list of setting names and valid payload formats.
      operationId: setSatSetting
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: SAT setting name (e.g., `heating_curve`, `deadband`, `boiler_capacity`)
          example: "heating_curve"
      requestBody:
        required: false
        content:
          text/plain:
            schema:
              type: string
              example: "1.5"
      responses:
        '200':
          description: Setting updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic Auth on protected/admin routes (ADR-056). Active ONLY when an
        HTTP password is configured; with no password set the device accepts the
        request without credentials (trusted-LAN model). Username is "admin".
  schemas:
    SensorStatus:
      type: object
      description: |
        Hardware sensor status. Returned by `GET /v2/sensors` and `GET /v2/sensors/status`.
      properties:
        sensors:
          type: object
          properties:
            dallas_enabled:
              type: boolean
              description: Whether Dallas 1-Wire temperature sensors are enabled in settings
            dallas_detected:
              type: boolean
              description: Whether at least one Dallas sensor was detected on the bus
            dallas_count:
              type: integer
              description: Number of detected Dallas sensors
            dallas_gpio:
              type: integer
              description: GPIO pin used for the 1-Wire bus
            dallas_poll_sec:
              type: integer
              description: Sensor polling interval in seconds
            simulated:
              type: boolean
              description: Whether sensor simulation mode is active (state.debug.bSensorSim)
            devices:
              type: object
              description: |
                Per-device readings. Only present when sensors are detected or simulation is active.
                Keys are 1-Wire addresses (16 hex characters); values are objects with `temp` (float, °C)
                and `epoch` (uint32, seconds since boot).
              additionalProperties:
                type: object
                properties:
                  temp:
                    type: number
                    description: Temperature in °C
                  epoch:
                    type: integer
                    description: Timestamp of last reading (seconds since boot)
            s0:
              type: object
              description: S0 pulse counter state
              properties:
                enabled:
                  type: boolean
                gpio:
                  type: integer
                  description: GPIO pin for S0 input
                poll_sec:
                  type: integer
                  description: S0 reporting interval in seconds
                pulses:
                  type: integer
                  description: Pulse count in the current interval
                total:
                  type: integer
                  description: Total pulse count since boot
                power_kw:
                  type: number
                  description: Calculated power in kW
                epoch:
                  type: integer
                  description: Timestamp of last pulse (seconds since boot)

    StatusOk:
      type: object
      description: Standard success response for SAT write operations
      properties:
        status:
          type: string
          enum: [ok]
      example:
        status: ok

    SatStatus:
      type: object
      description: |
        SAT runtime status. Contains ~50 fields covering control mode, setpoints,
        PID state, temperature sensors, cycle diagnostics, pressure, power, and safety.
        Add `?detail=full` to the request URL for extended health diagnostics.
      properties:
        sat_status:
          type: object
          properties:
            mode:
              type: string
              enum: [off, continuous, pwm]
              description: Current control mode
            active:
              type: boolean
              description: Whether SAT is actively controlling
            setpoint:
              type: number
              description: Final flow temperature setpoint sent to boiler (°C)
            target:
              type: number
              description: Target room temperature (°C)
            heating_curve:
              type: number
              description: Heating curve calculated value (°C)
            pid_output:
              type: number
              description: PID output = curve + P + I + D (°C)
            error:
              type: number
              description: PID error = target - room temp (°C)
            pid_p:
              type: number
              description: Proportional PID term (°C)
            pid_i:
              type: number
              description: Integral PID term (°C)
            pid_d:
              type: number
              description: Derivative PID term (°C)
            kp:
              type: number
              description: Current Kp gain
            ki:
              type: number
              description: Current Ki gain
            kd:
              type: number
              description: Current Kd gain
            room_temp:
              type: number
              description: Room temperature used by PID (°C)
            outside_temp:
              type: number
              description: Outside temperature used by heating curve (°C)
            boiler_status:
              type: integer
              minimum: 0
              maximum: 14
              description: "Boiler status code: 0=Off, 1=Idle, 2=Preheating, 3=At Setpoint, 4=Modulating Up, 5=Modulating Down, 6=Ignition Surge, 7=Stalled Ignition, 8=Anti-Cycling, 9=Pump Starting, 10=Waiting Flame, 11=Overshoot Cooling, 12=Post-Cycle, 13=Heating, 14=Cooling"
            cycle_class:
              type: string
              enum: [none, good, overshoot, underheat, short, uncertain]
              description: Last cycle classification
            pwm_duty:
              type: number
              minimum: 0.0
              maximum: 1.0
              description: PWM duty cycle (0.00-1.00)
            safety_tripped:
              type: boolean
              description: Safety shutdown active
            pressure:
              type: number
              description: Smoothed system pressure (bar)
            pressure_alarm:
              type: boolean
              description: Pressure alarm active
            power:
              type: number
              description: Current boiler power (kW)
            energy_total:
              type: number
              description: Cumulative energy (kWh)
            flame_status:
              type: string
              enum: [insufficient_data, healthy, idle_ok, stuck_on, stuck_off, pwm_short, short_cycling]
              description: Flame health status
      example:
        sat_status:
          mode: continuous
          active: true
          setpoint: 43.1
          target: 21.0
          heating_curve: 42.3
          pid_output: 43.1
          error: 0.5
          pid_p: 0.82
          pid_i: 0.03
          pid_d: -0.04
          room_temp: 20.5
          outside_temp: 8.0
          boiler_status: 3
          cycle_class: good
          pwm_duty: 0.0
          safety_tripped: false
          pressure: 1.5
          pressure_alarm: false
          power: 12.5
          energy_total: 234.5
          flame_status: healthy

    ApiError:
      type: object
      description: Standard API error response (ADR-035)
      properties:
        error:
          type: object
          properties:
            status:
              type: integer
              description: HTTP status code
            message:
              type: string
              description: Human-readable error message
          required:
            - status
            - message
      example:
        error:
          status: 400
          message: "Invalid message ID"

    OTDirectStatus:
      type: object
      description: |
        OTGW32 OT-direct runtime status object. Returned by `/v2/otdirect/status`,
        `/v2/otdirect/mode` (POST), and `/v2/otdirect/settings` (POST/PUT).
        All fields are read-only runtime state.
      properties:
        otdirect_status:
          type: object
          properties:
            mode:
              type: string
              enum: [gateway, monitor, bypass, master, loopback]
              description: |
                Current operating mode of the OT-direct engine.
                - `gateway` (default)  - full gateway with scheduler, thermostat forwarding, and overrides
                - `monitor`  - transparent pass-through; all frames forwarded unmodified
                - `bypass`  - thermostat direct to boiler via hardware relay; OT-direct inactive (requires bypass relay)
                - `master`  - OTGW32 is the sole OT master; scheduler only, no thermostat expected
                - `loopback`  - internal test mode with simulated boiler responses; no hardware required
            bypass:
              type: boolean
              description: True when the bypass relay is active (thermostat direct to boiler)
            stepup:
              type: boolean
              description: True when the 24V step-up converter is on
            monitor_mode:
              type: boolean
              description: True when the engine is in transparent pass-through mode (equivalent to `mode == "monitor"`)
            master_mode:
              type: boolean
              description: True when OTGW32 is the sole OT master (equivalent to `mode == "master"`)
            thermostat_connected:
              type: boolean
              description: True when a thermostat frame has been received within the configured setback timeout
            setback_active:
              type: boolean
              description: True when thermostat is considered disconnected and the setback temperature override is engaged
            schedule_total:
              type: integer
              description: Total number of OpenTherm Message IDs in the polling schedule
            schedule_active:
              type: integer
              description: Number of schedule entries currently active (not disabled by the boiler)
            schedule_disabled:
              type: integer
              description: Number of schedule entries disabled because the boiler returned UNKNOWN_DATA_ID three times
            overrides_active:
              type: integer
              description: Number of active write-override slots (CS=/TT=/SH=/SW= etc.)
            ot_online:
              type: boolean
              description: True when the OT serial bus is alive (frames recently received)
            thermostat:
              type: boolean
              description: True when the thermostat OT bus side is active (from `state.otBus.bThermostatState`)
            boiler:
              type: boolean
              description: True when the boiler OT bus side is active (from `state.otBus.bBoilerState`)

    SimulationStatus:
      type: object
      properties:
        simulation:
          type: object
          properties:
            active:
              type: boolean
              description: Whether simulation mode is currently active
            file:
              type: string
              description: Path to the simulation log file
            interval_ms:
              type: integer
              description: Replay interval in milliseconds
      example:
        simulation:
          active: false
          file: "/otgw_simulation.log"
          interval_ms: 1000

  responses:
    BadRequestJson:
      description: Bad request - invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 400
              message: "Invalid or missing message ID"

    MethodNotAllowedJson:
      description: |
        HTTP method not allowed.
        Includes `Allow` header listing valid methods per RFC 7231 §6.5.5.
      headers:
        Allow:
          description: Comma-separated list of valid HTTP methods for this endpoint
          schema:
            type: string
            example: "GET"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 405
              message: "Method not allowed"

    NotFound:
      description: API endpoint not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 404
              message: "Endpoint not found"

    URITooLong:
      description: Request URI exceeds maximum length
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 414
              message: "URI too long"

    InternalServerError:
      description: Internal server error (typically low heap memory)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              status: 500
              message: "Internal server error (low heap)"

x-api-design-notes: |
  **API Version**: v2 only. v0 and v1 have been removed and return 410 Gone.

  **Memory Constraints**:
  - ESP8266 has limited RAM (~40KB available after core libraries)
  - API enforces minimum 4KB free heap before processing requests

  **Boolean Values**:
  - `/v2/health` returns booleans as strings: "true" or "false"
  - `/v2/device/info` and `/v2/device/time` return proper JSON booleans

  **Error Handling**:
  - All errors return structured JSON: {"error":{"status":N,"message":"..."}}
  - All 405 responses include an `Allow` header listing valid methods (RFC 7231 §6.5.5)
  - Low heap conditions return 500 to prevent crashes

  **CORS Support**:
  - All responses include `Access-Control-Allow-Origin: *`
  - All endpoints respond to OPTIONS preflight with 204 No Content and CORS headers
  - CORS preflight response includes `Access-Control-Max-Age: 86400` (24h cache)

  **Polling Recommendations**:
  - Health endpoint: Poll every 30-60 seconds (each call writes a probe file to LittleFS)
  - Flash status: Poll every 1-2 seconds during upgrades
  - OpenTherm data: Poll every 5-10 seconds
  - PIC settings: On-demand only (triggers PR= readout cycle)

  **Home Assistant Integration**:
  - Use /v2/otgw/discovery to register entities
  - MQTT is the primary integration method
  - REST API provides fallback and manual control
