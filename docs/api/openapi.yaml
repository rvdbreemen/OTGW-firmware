openapi: 3.1.0
info:
  title: OTGW-firmware REST API
  description: |
    REST API for the OpenTherm Gateway (OTGW) firmware running on ESP8266.

    This API provides access to OpenTherm data, device information, settings,
    and control commands for the OpenTherm Gateway hardware.

    **Base URL**: `http://{device-ip}/api`

    **API Version**: v2. Earlier versions (v0, v1) have been removed and return 410 Gone.

    **Authentication**: Optional HTTP Basic Auth (username `admin`, password from settings).
    When no password is configured, all endpoints are open.
    When a password is set, mutating endpoints and settings require authentication.
    CSRF same-origin validation is enforced for authenticated browser requests.

    **Content-Type**: All responses are `application/json`

    **API Design** (ADR-035):
    - All error responses return structured JSON: `{"error":{"status":N,"message":"..."}}`
    - Queued operations return 202 Accepted
    - RESTful resource endpoints: `/otgw/messages/{id}`, `/otgw/commands`, `/otgw/discovery`
    - Consistent CORS headers on all responses
    - **OPTIONS preflight support** for all v2 endpoints (returns 204 with CORS headers)
    - **Allow header** on all 405 responses per RFC 7231 §6.5.5
  version: 2.0.0
  contact:
    name: Robert van den Breemen
    url: https://github.com/rvdbreemen/OTGW-firmware
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://{device-ip}/api
    description: Local OTGW device
    variables:
      device-ip:
        default: otgw.local
        description: IP address or hostname of the OTGW device

tags:
  - name: Health
    description: Device health and status checks
  - name: Device Info
    description: Device information and system status
  - name: Settings
    description: Device configuration and settings
  - name: OpenTherm Data
    description: Access OpenTherm message data
  - name: OTGW Commands
    description: Send commands to the OpenTherm Gateway
  - name: PIC Gateway
    description: PIC microcontroller status and settings
  - name: Flash/Upgrade
    description: Firmware upgrade status and operations
  - name: Sensors
    description: Dallas temperature sensor label management
  - name: Filesystem
    description: Filesystem and firmware file listing
  - name: Simulation
    description: OTGW simulation mode control
  - name: Webhook
    description: Webhook testing
  - name: Debug
    description: Flat key/value diagnostic dump of build, runtime, settings and state
  - name: Network
    description: WiFi scan and network diagnostics
  - name: SAT
    description: |
      SAT (Smart Autotune Thermostat) is an embedded heating controller that runs entirely
      on the ESP and turns the OTGW into a standalone smart thermostat. It implements a
      weather-compensated heating curve combined with a PID v3 controller with automatic
      gain tuning. Supports continuous modulation and PWM flame cycling.

      SAT endpoints are available on all builds but will return an error if SAT is not
      compiled in or not enabled.
  - name: OT Direct (OTGW32)
    description: |
      OT Direct endpoints are only available on OTGW32 hardware (`HAS_DIRECT_OT=1`).
      On standard ESP8266+PIC hardware all `/v2/otdirect/*` endpoints return
      `503 Service Unavailable` with `{"error":{"status":503,"message":"No OT-direct hardware - OTGW32 functions disabled"}}`.
  - name: Discovery
    description: Retained MQTT auto-discovery verification and republish (ADR-062)
  - name: MQTT
    description: Force a full OT-value republish to MQTT (distinct from discovery)

paths:
  /v2/health:
    get:
      tags:
        - Health
      summary: Get device health status
      description: |
        Returns the current health status of the device including uptime,
        heap memory, connectivity status, and filesystem status.

        **Side effect**: Each call writes a small probe file (`/.health`) to LittleFS
        to verify the filesystem is writable (not just mounted). This incurs a flash
        write on every request. Do not poll this endpoint at high frequency from
        external monitoring tools  - use 30-60 second intervals at minimum.
        The intended use-case is post-OTA boot detection, where polling stops
        immediately once `status: UP` is received.
      operationId: getHealth
      responses:
        '200':
          description: Health status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  health:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [UP, DEGRADED]
                      uptime:
                        type: string
                        example: "2d 3h 45m"
                      heap:
                        type: integer
                        description: Free heap memory in bytes
                      wifirssi:
                        type: integer
                        description: WiFi signal strength in dBm (0 when in AP or Ethernet mode)
                      networkmode:
                        type: string
                        enum: [WiFi, Ethernet]
                        description: Active network mode
                      mqttconnected:
                        type: boolean
                        description: MQTT broker connected (real JSON boolean since the ArduinoJson v7 migration, ADR-141)
                      otgwconnected:
                        type: boolean
                        description: OpenTherm gateway/bus online
                      littlefsMounted:
                        type: boolean
                        description: LittleFS mounted and writable
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/debug:
    get:
      tags:
        - Debug
      summary: Flat diagnostic dump
      description: |
        Returns a flat JSON map of build identifiers, runtime counters, every
        persistent setting (sensitive fields masked), and the full transient
        state struct. The output is intended for bug reports and field support
        triage; the shape is not part of the long-term stable contract and may
        gain new keys between releases.

        Sensitive setting values (HTTP password, MQTT password, weather API
        key) are emitted as `"***"` when present and `"(not set)"` when empty.
        OT-direct sub-sections appear only on OTGW32 builds; SAT BLE and
        weather sub-sections only on ESP32 builds.

        Always requires authentication when an HTTP password is configured.
      operationId: getDebugDump
      security:
        - basicAuth: []
      responses:
        '200':
          description: Diagnostic dump retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  debug:
                    type: object
                    description: |
                      Flat key/value map. Keys are dotted paths grouped under
                      `build.*`, `runtime.*`, `settings.<section>.*`,
                      `state.<section>.*`. See `handleDebugDump()` in
                      `restAPI.ino` for the authoritative key list.
        '401':
          description: Authentication required
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/network/scan:
    get:
      tags:
        - Network
      summary: Asynchronous WiFi network scan
      description: |
        Triggers and reports a non-blocking WiFi network scan (TASK-585).

        First call starts the scan and returns `{"status":"scanning"}`.
        Subsequent polls return the same payload while the scan is in
        progress. Once complete the response is `{"status":"ready","count":N,"networks":[...]}`,
        the scan buffer is freed, and the next call starts a fresh scan.

        Refuses to scan while a PIC flash is in progress (returns 503).
        Quotes and backslashes in SSIDs are replaced with underscore to keep
        the JSON valid without escaping.
      operationId: scanWifiNetworks
      responses:
        '200':
          description: Scan in progress or completed
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [scanning]
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [ready]
                      count:
                        type: integer
                      networks:
                        type: array
                        items:
                          type: object
                          properties:
                            ssid:
                              type: string
                            rssi:
                              type: integer
                              description: Signal strength in dBm
                            channel:
                              type: integer
                            secured:
                              type: boolean
                            connected:
                              type: boolean
                              description: True when this is the SSID the device is currently associated with
              examples:
                scanning:
                  value:
                    status: scanning
                ready:
                  value:
                    status: ready
                    count: 2
                    networks:
                      - ssid: "MyWiFi"
                        rssi: -55
                        channel: 6
                        secured: true
                        connected: true
                      - ssid: "Guest"
                        rssi: -78
                        channel: 11
                        secured: true
                        connected: false
        '404':
          description: Unknown sub-resource (only `/scan` is implemented)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '503':
          description: Scan unavailable during a PIC flash operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/settings:
    get:
      tags:
        - Settings
      summary: Get device settings
      description: |
        Retrieve all device configuration settings as a JSON object.
        Requires authentication when HTTP password is configured.

        Password fields use a protected round-trip format:
        - `password=0` means no password is currently stored
        - `password=XX` means a password is stored and `XX` is its length
      operationId: getSettings
      responses:
        '200':
          description: Settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: object
                    description: All device settings with type metadata
        '401':
          description: Authentication required
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      security:
        - basicAuth: []
      tags:
        - Settings
      summary: Update a single device setting
      description: |
        Update one device setting by name. Requires authentication when HTTP
        password is configured.

        Password field behavior for `httppasswd` and `mqttpasswd`:
        - `"notthispassword"` keeps the existing stored password unchanged
        - `""` clears the stored password
        - Any other string replaces the stored password
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - value
              properties:
                name:
                  type: string
                  description: Setting field name
                value:
                  description: New value for the setting
            example:
              name: "hostname"
              value: "MyOTGW"
      responses:
        '200':
          description: Settings updated successfully (echoes submitted JSON)
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '401':
          description: Authentication required
        '403':
          description: CSRF protection - invalid origin
    put:
      security:
        - basicAuth: []
      tags:
        - Settings
      summary: Update a single device setting (PUT alias)
      description: Alias for POST. Same behavior.
      operationId: updateSettingsPut
      requestBody:
        $ref: '#/paths/~1v2~1settings/post/requestBody'
      responses:
        '200':
          description: Settings updated successfully
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '401':
          description: Authentication required
        '403':
          description: CSRF protection - invalid origin

  /v2/sensors:
    get:
      tags:
        - Sensors
      summary: Get sensor status (root alias)
      description: |
        Alias for `GET /v2/sensors/status`. Returns the current hardware sensor status
        including Dallas temperature sensor configuration and readings, and S0 pulse counter state.
      operationId: getSensorStatusRoot
      responses:
        '200':
          description: Sensor status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensorStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sensors/status:
    get:
      tags:
        - Sensors
      summary: Get sensor hardware status
      description: |
        Returns the current hardware sensor status as a JSON object with a `sensors` wrapper.

        Includes:
        - Dallas 1-Wire temperature sensor configuration (enabled, GPIO pin, poll interval)
        - Detection state and per-device readings with temperature (°C) and last-update epoch
        - S0 pulse counter configuration and current state (enabled, GPIO pin, pulse counts, power in kW)

        The `devices` sub-object is only present when sensors are detected or sensor simulation
        is active (`state.debug.bSensorSim`).
      operationId: getSensorStatus
      responses:
        '200':
          description: Sensor status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensorStatus'
              example:
                sensors:
                  dallas_enabled: true
                  dallas_detected: true
                  dallas_count: 2
                  dallas_gpio: 4
                  dallas_poll_sec: 30
                  simulated: false
                  devices:
                    "28FF64D1841703F1":
                      temp: 21.5
                      epoch: 1774548600
                    "28FF94E2841703F2":
                      temp: 18.3
                      epoch: 1774548600
                  s0:
                    enabled: false
                    gpio: 0
                    poll_sec: 10
                    pulses: 0
                    total: 0
                    power_kw: 0.000
                    epoch: 0
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sensors/labels:
    get:
      tags:
        - Sensors
      summary: Get all Dallas sensor labels
      description: |
        Returns all configured Dallas temperature sensor labels.
        Each sensor is identified by its 1-Wire address and has a user-defined label.
        Returns empty object `{}` if no labels file exists.
      operationId: getAllDallasLabels
      responses:
        '200':
          description: Labels retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
              example:
                "28FF64D1841703F1": "Living Room"
                "28FF94E2841703F2": "Kitchen"
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      security:
        - basicAuth: []
      tags:
        - Sensors
      summary: Update all Dallas sensor labels
      description: |
        Update all Dallas temperature sensor labels. Provide a JSON object
        mapping sensor addresses to their new labels.
      operationId: updateAllDallasLabels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
            example:
              "28FF64D1841703F1": "Living Room"
              "28FF94E2841703F2": "Kitchen"
      responses:
        '200':
          description: Labels updated successfully
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/device/info:
    get:
      tags:
        - Device Info
      summary: Get comprehensive device information
      description: |
        Returns device information wrapped in a top-level `device` object. Boolean
        values are proper JSON booleans (not strings) in this endpoint.

        Includes firmware version, network info, memory, connectivity status, and
        gateway/OT-Direct mode.

        The field set is **board-conditional and non-exhaustive**:
        - PIC fields (`picavailable`, `picfwversion`, `picdeviceid`, `picfwtype`,
          `otgwmode`) appear only on PIC/Classic hardware.
        - OT-Direct fields (`otd*`) appear only on the OTGW32 / OT-Direct board.
        - Diagnostic counters (`perf_*`, `hd_*`, `disc_*`) and per-interface
          network fields (`wifi_current_*`, `eth_current_*`) are also present;
          they are covered by `additionalProperties` rather than enumerated here.

        Consumers must ignore unknown keys.
      operationId: getDeviceInfo
      responses:
        '200':
          description: Device information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  device:
                    type: object
                    additionalProperties: true
                    properties:
                      author:
                        type: string
                      fwversion:
                        type: string
                      platform:
                        type: string
                        description: 'Chip platform ("ESP8266" or "ESP32")'
                      board:
                        type: string
                        description: Human-readable board name
                      hardware_type:
                        type: string
                        description: 'Board codepath token ("otgw32", "esp8266", "esp32-classic")'
                      oledpresent:
                        type: boolean
                        description: OLED display present on this board
                      ethernetpresent:
                        type: boolean
                        description: Ethernet hardware present on this board
                      ethernetlink:
                        type: boolean
                        description: Ethernet link is up
                      picavailable:
                        type: boolean
                        description: PIC co-processor present (PIC/Classic hardware only)
                      picfwversion:
                        type: string
                        description: PIC firmware version (PIC/Classic hardware only)
                      picdeviceid:
                        type: string
                        description: PIC device ID (PIC/Classic hardware only)
                      picfwtype:
                        type: string
                        description: PIC firmware type (PIC/Classic hardware only)
                      compiled:
                        type: string
                      hostname:
                        type: string
                      ipaddress:
                        type: string
                      macaddress:
                        type: string
                      freeheap:
                        type: integer
                      maxfreeblock:
                        type: integer
                      chipid:
                        type: string
                      coreversion:
                        type: string
                      sdkversion:
                        type: string
                      cpufreq:
                        type: integer
                      sketchsize:
                        type: integer
                      freesketchspace:
                        type: integer
                      flashchipid:
                        type: string
                      flashchipsize:
                        type: number
                      flashchiprealsize:
                        type: number
                      LittleFSsize:
                        type: number
                      flashchipspeed:
                        type: number
                      flashchipmode:
                        type: string
                      ssid:
                        type: string
                      wifirssi:
                        type: integer
                      wifiquality:
                        type: integer
                      wifiquality_text:
                        type: string
                      ntpenable:
                        type: boolean
                      ntptimezone:
                        type: string
                      uptime:
                        type: string
                      lastreset:
                        type: string
                      bootcount:
                        type: integer
                      mqttconnected:
                        type: boolean
                      thermostatconnected:
                        type: boolean
                      boilerconnected:
                        type: boolean
                      otgwmode:
                        type: string
                        description: '"on", "off", or "detecting"'
                      otgwconnected:
                        type: boolean
                      otcommandinterface:
                        type: string
                        enum: [PIC, OT-Direct, None]
                        description: Which OT command interface is active (sendDeviceInfoV2)
                      otgwsimulation:
                        type: boolean
                      # Hardware platform fields
                      board:
                        type: string
                        description: Hardware board identifier (e.g., "esp8266", "esp32s3")
                      hardwaremode:
                        type: string
                        description: Active hardware mode ("pic" or "otdirect")
                      networkmode:
                        type: string
                        enum: [WiFi, Ethernet]
                        description: Active network mode
                      # OT Direct fields  - only present when otdirectavailable=true (OTGW32 builds)
                      otdirectavailable:
                        type: boolean
                        description: True when OTGW32 OT-direct hardware is present and enabled
                      otdmode:
                        type: string
                        enum: [gateway, monitor, bypass, master, loopback]
                        description: Current OT-direct operating mode (OTGW32 only)
                      otdbypass:
                        type: boolean
                        description: True when thermostat is routed directly to boiler via bypass relay
                      otdmonitor:
                        type: boolean
                        description: True when engine is in transparent monitor/pass-through mode
                      otdmaster:
                        type: boolean
                        description: True when OTGW32 is acting as sole OT master (no thermostat)
                      otdstepup:
                        type: boolean
                        description: True when the 24V step-up converter is active
                      otdthermostat:
                        type: boolean
                        description: True when a thermostat frame has been received within the setback timeout
                      otdsetback:
                        type: boolean
                        description: True when thermostat is disconnected and setback override is active
                      otdschedtotal:
                        type: integer
                        description: Total number of OT message IDs in the polling schedule
                      otdschedactive:
                        type: integer
                        description: Number of schedule entries currently enabled (not disabled by boiler)
                      otdscheddisabled:
                        type: integer
                        description: Number of schedule entries disabled because boiler returned UNKNOWN_DATA_ID
                      otdoverrides:
                        type: integer
                        description: Number of active write-override slots
              examples:
                example:
                  value:
                    device:
                      author: "Robert van den Breemen"
                      fwversion: "1.3.0"
                      picavailable: true
                      hostname: "OTGW"
                      ipaddress: "192.168.1.100"
                      freeheap: 25600
                      mqttconnected: true
                      otgwconnected: true
                      otgwsimulation: false
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/device/time:
    get:
      tags:
        - Device Info
      summary: Get device date/time
      description: |
        Returns the current device date and time with timezone applied,
        plus runtime status fields.
      operationId: getDeviceTime
      responses:
        '200':
          description: Device time retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  devtime:
                    type: object
                    properties:
                      dateTime:
                        type: string
                        example: "2026-03-26 10:30:00"
                      epoch:
                        type: integer
                        example: 1774548600
                      message:
                        type: string
                        description: Current status message text
                      psmode:
                        type: boolean
                        description: Priority Service mode active
                      otgwsimulation:
                        type: boolean
                        description: OTGW simulation mode active
                      freeheap:
                        type: integer
                        description: Free heap memory in bytes
                      maxfreeblock:
                        type: integer
                        description: Largest contiguous free block
                      wifiquality:
                        type: integer
                        minimum: 0
                        maximum: 100
                        description: WiFi signal quality as a percentage (0-100). Returns 0 when in AP fallback mode, 100 when connected via Ethernet.
                      networkmode:
                        type: string
                        enum: [WiFi, Ethernet]
                        description: Active network mode
                      apfallback:
                        type: boolean
                        description: "True when the device has fallen back to AP mode (SSID: OTGW-<MAC>, IP: 192.168.4.1). Only present in pre-release builds and only when AP fallback is active."
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/device/crashlog:
    get:
      tags:
        - Device Info
      summary: Get crash log
      description: |
        Returns the latest stored abnormal reboot/crash diagnostics,
        if available. Includes exception cause and stack trace summary.
      operationId: getDeviceCrashLog
      responses:
        '200':
          description: Crash log retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  crashlog:
                    type: object
                    properties:
                      available:
                        type: boolean
                        description: Whether a crash log is available
                      summary:
                        type: string
                        description: Short crash summary (empty if not available)
                        example: "Exception (28) at 0x40201234"
                      details:
                        type: string
                        description: Detailed crash info (empty if not available)
                        example: "epc1=0x40201234 epc2=0x00000000"
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/flash/status:
    get:
      tags:
        - Flash/Upgrade
      summary: Get unified flash status
      description: Returns flash status for both ESP8266 and PIC firmware upgrades.
      operationId: getFlashStatus
      responses:
        '200':
          description: Flash status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  flashstatus:
                    type: object
                    properties:
                      flashing:
                        type: boolean
                        description: Any flash operation in progress
                      pic_flashing:
                        type: boolean
                        description: PIC flash specifically in progress
                      pic_progress:
                        type: integer
                        minimum: 0
                        maximum: 100
                      pic_filename:
                        type: string
                      pic_error:
                        type: string
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/pic/flash-status:
    get:
      tags:
        - PIC Gateway
      summary: Get PIC flash status
      description: Minimal endpoint for polling PIC flash state during upgrade.
      operationId: getPICFlashStatus
      responses:
        '200':
          description: PIC flash status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  flashstatus:
                    type: object
                    properties:
                      flashing:
                        type: boolean
                      progress:
                        type: integer
                        minimum: 0
                        maximum: 100
                      filename:
                        type: string
                      error:
                        type: string
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '503':
          $ref: '#/components/responses/PicUnavailable'

  /v2/pic/update-check:
    get:
      tags:
        - PIC Gateway
      summary: Check for PIC firmware updates
      description: |
        Checks for available PIC firmware updates by making an outbound HTTP
        request to otgw.tclcode.com. Only call on-demand (e.g., when the user
        opens the firmware tab).
      operationId: getPICUpdateCheck
      responses:
        '200':
          description: Update check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  pic_update:
                    type: object
                    properties:
                      current:
                        type: string
                        description: Currently installed PIC firmware version
                      latest:
                        type: string
                        description: Latest available version from otgw.tclcode.com
                      update_available:
                        type: boolean
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '503':
          $ref: '#/components/responses/PicUnavailable'

  /v2/pic/settings:
    get:
      tags:
        - PIC Gateway
      summary: Get PIC gateway settings
      description: |
        Returns the cached PIC gateway settings last queried via PR= commands.
        Triggers a new readout cycle (one PR= command every 3 seconds,
        approximately 45 seconds for a full cycle).

        Empty string values mean "not yet queried" or "not supported by this
        firmware version".

        Source: Schelte Bron's OTGW firmware docs (https://otgw.tclcode.com/firmware.html)
      operationId: getPICSettings
      responses:
        '200':
          description: PIC settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  pic_settings:
                    type: object
                    properties:
                      setpoint_override:
                        type: string
                        description: Current temperature setpoint override (PR=A)
                      setback:
                        type: string
                        description: Setback temperature (PR=B)
                      dhw_override:
                        type: string
                        description: DHW override state
                      gpio:
                        type: string
                        description: GPIO pin configuration (PR=G)
                      gpio_states:
                        type: string
                        description: GPIO pin states (PR=I)
                      led:
                        type: string
                        description: LED function assignments (PR=L)
                      tweaks:
                        type: string
                        description: Tweak flags (PR=T)
                      temp_sensor:
                        type: string
                        description: Temperature sensor reading (PR=O)
                      smart_power:
                        type: string
                        description: Smart power mode (PR=P)
                      thermostat_detect:
                        type: string
                        description: Thermostat detection mode (PR=D)
                      builddate:
                        type: string
                        description: PIC firmware build date (PR=B)
                      clock_mhz:
                        type: string
                        description: PIC clock speed (PR=C)
                      reset_cause:
                        type: string
                        description: Last PIC reset cause (PR=Q)
                      standalone_interval:
                        type: string
                        description: Standalone mode interval (PR=M)
                      voltage_ref:
                        type: string
                        description: Voltage reference (PR=V)
              example:
                pic_settings:
                  setpoint_override: "20.00"
                  setback: "15.00"
                  dhw_override: ""
                  gpio: "0/1"
                  gpio_states: "0/0"
                  led: "F/X/O/M/P/C"
                  tweaks: "1/1/1/1"
                  temp_sensor: "O=19.50"
                  smart_power: "Low"
                  thermostat_detect: "I"
                  builddate: "2023-01-01"
                  clock_mhz: "4"
                  reset_cause: "Power-on"
                  standalone_interval: "0"
                  voltage_ref: "3.3"
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '503':
          $ref: '#/components/responses/PicUnavailable'

  /v2/firmware/files:
    get:
      tags:
        - Filesystem
      summary: List PIC firmware files
      description: Returns list of available PIC firmware files on the filesystem.
      operationId: getFirmwareFiles
      responses:
        '200':
          description: Firmware file list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    size:
                      type: integer
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/filesystem/files:
    get:
      tags:
        - Filesystem
      summary: List filesystem files
      description: |
        Returns the contents of the LittleFS filesystem as a heterogeneous JSON
        array. Each leading element is a file or directory entry; the FINAL
        element is a storage-summary object (`usedBytes`/`totalBytes`/`freeBytes`/
        `truncated`) rather than a file entry. Consumers must treat the last
        element specially (detect by absence of `name`/presence of `totalBytes`).
      operationId: getFilesystemFiles
      responses:
        '200':
          description: File list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                    - type: object
                      description: File or directory entry
                      properties:
                        name:
                          type: string
                          description: Entry name (no leading slash)
                        size:
                          type: integer
                          description: File size in bytes (0 for directories)
                        type:
                          type: string
                          enum: [file, dir]
                          description: Entry type
                    - type: object
                      description: Trailing storage-summary object (last array element)
                      properties:
                        usedBytes:
                          type: integer
                          description: Bytes used on the filesystem
                        totalBytes:
                          type: integer
                          description: Total filesystem capacity in bytes
                        freeBytes:
                          type: integer
                          description: Free bytes remaining
                        truncated:
                          type: boolean
                          description: True if the listing was truncated (too many entries)
              example:
                - name: index.html
                  size: 39791
                  type: file
                - name: fonts
                  size: 0
                  type: dir
                - usedBytes: 971980
                  totalBytes: 2097152
                  freeBytes: 1125172
                  truncated: false
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/filesystem/hash-check:
    get:
      tags:
        - Filesystem
      summary: Check firmware/filesystem version match
      description: |
        Compares the firmware git hash with the filesystem git hash.
        Used to detect mismatches between firmware and filesystem (e.g., after
        a firmware-only OTA update without flashing the new LittleFS image).
      operationId: getFilesystemHashCheck
      responses:
        '200':
          description: Hash check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  filesystem_check:
                    type: object
                    properties:
                      match:
                        type: boolean
                      fw_hash:
                        type: string
                      fs_hash:
                        type: string
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/simulate:
    get:
      tags:
        - Simulation
      summary: Get OTGW simulation status
      description: Returns the current OTGW simulation mode status.
      operationId: getSimulationStatus
      responses:
        '200':
          description: Simulation status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/simulate/start:
    post:
      tags:
        - Simulation
      summary: Start OTGW simulation
      description: |
        Enables OTGW simulation mode. The gateway replays data from
        `/otgw_simulation.log` instead of reading from the PIC serial port.
      operationId: startSimulation
      security:
        - basicAuth: []
      responses:
        '200':
          description: Simulation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - Simulation
      summary: Start OTGW simulation (PUT alias)
      operationId: startSimulationPut
      responses:
        '200':
          description: Simulation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/simulate/stop:
    post:
      tags:
        - Simulation
      summary: Stop OTGW simulation
      description: |
        Disables OTGW simulation mode. Resumes reading from the live PIC serial port.
      operationId: stopSimulation
      security:
        - basicAuth: []
      responses:
        '200':
          description: Simulation stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - Simulation
      summary: Stop OTGW simulation (PUT alias)
      operationId: stopSimulationPut
      responses:
        '200':
          description: Simulation stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationStatus'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/otmonitor:
    get:
      tags:
        - OpenTherm Data
      summary: Get all OpenTherm data
      description: |
        Returns all available OpenTherm data. Includes temperatures, status flags,
        pressures, S0 counter data (when enabled), and Dallas sensor data (when enabled).

        Each entry has value, unit, and lastupdated (seconds since boot) fields.
      operationId: getOTmonitor
      responses:
        '200':
          description: OTmonitor data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  otmonitor:
                    type: object
                    description: Map of OpenTherm data entries
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/telegraf:
    get:
      tags:
        - OpenTherm Data
      summary: Get OpenTherm data (Telegraf alias)
      description: |
        Same response as `/v2/otgw/otmonitor`. Provided as a compatibility alias
        for Telegraf monitoring system integration.
      operationId: getTelegraf
      responses:
        '200':
          description: Telegraf data retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/messages/{msgid}:
    get:
      tags:
        - OpenTherm Data
      summary: Get OpenTherm message by ID
      description: |
        Retrieve the current value for an OpenTherm message by its numeric ID (0-127).
        The value type depends on the message: float for f88 (fixed-point) types,
        integer for all others.
      operationId: getOTGWMessage
      parameters:
        - name: msgid
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 127
      responses:
        '200':
          description: Message value retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  label:
                    type: string
                  value: {}
                  unit:
                    type: string
              example:
                label: "boilertemperature"
                value: 45.5
                unit: "\u00b0C"
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/commands:
    post:
      tags:
        - OTGW Commands
      summary: Send command to OpenTherm Gateway
      description: |
        Send a command to the OpenTherm Gateway. The command is provided in the
        JSON request body. Returns 202 Accepted because the command is queued
        for asynchronous processing.

        If the body is not valid JSON with a `command` field, the raw body text
        is used as the command string.

        Command format: two alphabetic characters + `=` + value (e.g., `TT=20.5`).
      operationId: sendOTGWCommand
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  pattern: '^[A-Za-z]{2}=.+$'
                  description: OTGW command in format XX=value
            example:
              command: "TT=20.5"
      responses:
        '202':
          description: Command queued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [queued]
              example:
                status: "queued"
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '413':
          description: Command too long
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      security:
        - basicAuth: []
      tags:
        - OTGW Commands
      summary: Send command (PUT alias)
      operationId: sendOTGWCommandPut
      requestBody:
        $ref: '#/paths/~1v2~1otgw~1commands/post/requestBody'
      responses:
        '202':
          description: Command queued for processing
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otgw/discovery:
    post:
      tags:
        - OTGW Commands
      summary: Trigger MQTT autodiscovery
      description: |
        Marks all known OT message IDs as pending and triggers asynchronous
        drip-publishing of MQTT autodiscovery configs for Home Assistant integration.

        Discovery configs are composed by hand-written streaming functions in
        `MQTTHaDiscovery.cpp` (see ADR-077). The legacy runtime template file
        `data/mqttha.cfg` is archived under `docs/archive/` as historical
        reference only. The drip publisher issues one config every 3 seconds
        (slowed to every 30 seconds under heap pressure) to avoid MQTT burst
        storms.

        Produced entity categories: 289 sensors, 53 binary_sensors, 2 climate
        (Thermostat + DHW Control), 1 number (Toutside_override), 13 SAT switches
        and 1 SAT select (TASK-284), plus runtime Dallas sensor entries.

        Returns 202 Accepted.
      operationId: triggerDiscovery
      security:
        - basicAuth: []
      responses:
        '202':
          description: Discovery accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [accepted]
              example:
                status: "accepted"
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      tags:
        - OTGW Commands
      summary: Trigger MQTT autodiscovery (PUT alias)
      operationId: triggerDiscoveryPut
      security:
        - basicAuth: []
      responses:
        '202':
          description: Discovery accepted for processing
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/discovery:
    get:
      tags:
        - Discovery
      summary: Get discovery verification status, counters and settings
      description: |
        Returns the current state of the retained-discovery verification mechanism
        introduced in 1.4.1 (ADR-062). This is an observational endpoint: it does
        not start a verify run or publish anything. Use it to inspect whether a
        verify window is currently active, when the last run completed, how many
        retained configs were missing or orphaned on the last run, and whether
        automatic daily verification is enabled.

        This endpoint is distinct from `/v2/otgw/discovery`, which publishes all
        Home Assistant discovery topics unconditionally.
      operationId: getDiscoveryStatus
      responses:
        '200':
          description: Discovery state retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - verification
                  - counters
                  - settings
                properties:
                  verification:
                    type: object
                    properties:
                      active:
                        type: boolean
                        description: True while the 15-second verify window is open.
                      last_epoch:
                        type: integer
                        format: uint32
                        description: Unix-epoch timestamp of the last completed verify run (0 = never run since boot).
                      last_missing:
                        type: integer
                        format: uint16
                        description: Retained discovery topics expected but not observed on the last verify run.
                      last_orphan:
                        type: integer
                        format: uint16
                        description: Retained discovery topics observed under `<haprefix>/+/<other-nodeId>/#` that do not belong to this node. Informational only; orphans are never deleted by OTGW (see ADR-062).
                  counters:
                    type: object
                    properties:
                      published_topics:
                        type: integer
                        format: uint32
                        description: Running count of discovery topics successfully published by the streaming helpers since boot (or since the last `clearMQTTConfigDone`).
                      pending_ids:
                        type: integer
                        format: uint16
                        description: Number of discovery IDs currently marked pending in the drip pipeline.
                      verify_runs:
                        type: integer
                        format: uint32
                        description: Lifetime count of verify windows started since boot.
                      republish_triggered:
                        type: integer
                        format: uint32
                        description: Lifetime count of verify runs that ended with `last_missing > 0` and triggered `markAllMQTTConfigPending()`.
                  settings:
                    type: object
                    properties:
                      auto_verify:
                        type: boolean
                        description: Reflects `settings.mqtt.bDiscoveryAutoVerify`. When true, a verify run is triggered automatically once per day at the day-flip boundary.
              example:
                verification:
                  active: false
                  last_epoch: 1745236800
                  last_missing: 0
                  last_orphan: 0
                counters:
                  published_topics: 82
                  pending_ids: 0
                  verify_runs: 4
                  republish_triggered: 0
                settings:
                  auto_verify: true
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/discovery/verify:
    post:
      tags:
        - Discovery
      summary: Start a retained-discovery verification window
      description: |
        Opens a 15-second subscription window on `<haprefix>/+/<nodeId>/#` and
        counts retained discovery configs seen against
        `state.discovery.iPublishedTopicCount`. On completion the firmware
        re-announces any missing configs via the drip. See ADR-062 for the full
        mechanism.

        The handler refuses to start the window under several conditions (see
        error responses); in that case the caller should not retry immediately.
      operationId: startDiscoveryVerify
      security:
        - basicAuth: []
      responses:
        '202':
          description: Verification window started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [verification_started]
                  expected:
                    type: integer
                    format: uint32
                    description: Number of retained configs the firmware expects to see during the window.
                  window_ms:
                    type: integer
                    description: Window duration in milliseconds (currently 15000).
              example:
                status: "verification_started"
                expected: 82
                window_ms: 15000
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '409':
          description: Verification cannot start because discovery is busy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                alreadyActive:
                  summary: Verify already running
                  value:
                    error:
                      status: 409
                      message: "Verification already active"
                dripInProgress:
                  summary: Discovery drip still publishing
                  value:
                    error:
                      status: 409
                      message: "Discovery drip in progress"
        '503':
          description: Verification cannot start because a precondition failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                mqttDown:
                  summary: MQTT not connected
                  value:
                    error:
                      status: 503
                      message: "MQTT not connected"
                lowHeap:
                  summary: Free heap below start threshold
                  value:
                    error:
                      status: 503
                      message: "Heap too low for verify"
                startRefused:
                  summary: Verification layer refused the start (see telnet log)
                  value:
                    error:
                      status: 503
                      message: "Verification start refused (see telnet log)"

  /v2/discovery/republish:
    post:
      tags:
        - Discovery
      summary: Mark all discovery IDs pending for immediate re-announce
      description: |
        Calls `markAllMQTTConfigPending()` directly, without running a verify
        pass first. All discovery IDs are flagged pending and the drip will
        re-publish them at its configured cadence.

        Use this when you already know the broker's retained state is bad (for
        example after a broker reinstall without persistence) and want to skip
        the verify window. For normal troubleshooting, prefer
        `POST /v2/discovery/verify`, which only triggers a republish when
        retained configs are actually missing.
      operationId: republishDiscovery
      security:
        - basicAuth: []
      responses:
        '200':
          description: All discovery IDs marked pending
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [marked_pending]
                  count:
                    type: integer
                    format: uint16
                    description: Number of discovery IDs now pending in the drip pipeline.
              example:
                status: "marked_pending"
                count: 82
        '429':
          description: Republish cooldown active (a 60s rate-limit between republishes).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error:
                  status: 429
                  message: "Republish cooldown active, retry in 60s"
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '503':
          description: MQTT is not connected; nothing was marked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error:
                  status: 503
                  message: "MQTT not connected"

  /v2/mqtt/republish:
    post:
      security:
        - basicAuth: []
      tags:
        - MQTT
      summary: Force a full OT-value republish
      description: |
        Resets MQTT publish eligibility so every observed OpenTherm value is
        re-published as if seen for the first time (TASK-936). Use this to
        repopulate a broker after a wipe without re-announcing Home Assistant
        discovery configs.

        This is distinct from `POST /v2/discovery/republish`, which re-announces
        the HA discovery *configs* rather than the OT *values*.

        A 60-second cooldown rate-limits repeated calls (CWE-770); a call inside
        the window returns 429 with the remaining seconds.
      operationId: republishMqttValues
      responses:
        '200':
          description: Republish requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [republish_requested]
              example:
                status: "republish_requested"
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '429':
          description: Republish cooldown active (a 60s rate-limit between republishes).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error:
                  status: 429
                  message: "Republish cooldown active, retry in 60s"
        '503':
          description: MQTT is not connected; nothing was republished.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error:
                  status: 503
                  message: "MQTT not connected"

  /v2/webhook/test:
    post:
      security:
        - basicAuth: []
      tags:
        - Webhook
      summary: Test webhook delivery
      description: |
        Triggers a test webhook call to verify the configured webhook URL is reachable.
        Requires authentication when HTTP password is configured.
      operationId: testWebhook
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
            enum: ["on", "off", "1", "0"]
          description: Webhook state to test (on/1 or off/0)
      responses:
        '200':
          description: Webhook test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
              example:
                status: "ok"
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '401':
          description: Authentication required
        '403':
          description: CSRF protection - invalid origin
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - Webhook
      summary: Test webhook delivery (PUT alias)
      operationId: testWebhookPut
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
            enum: ["on", "off", "1", "0"]
      responses:
        '200':
          description: Webhook test completed
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '401':
          description: Authentication required
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  # --- OT Direct endpoints (OTGW32 only) ---

  /v2/otdirect/status:
    get:
      tags:
        - OT Direct (OTGW32)
      summary: Get OT Direct runtime status
      description: |
        Returns the full OTGW32 OT-direct runtime status. All fields reflect the
        current in-memory state of the OT-direct engine.

        **OTGW32 only**  - returns 503 on standard ESP8266+PIC hardware.
      operationId: getOTDirectStatus
      responses:
        '200':
          description: OT Direct status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTDirectStatus'
              example:
                otdirect_status:
                  mode: "gateway"
                  bypass: false
                  stepup: true
                  monitor_mode: false
                  master_mode: false
                  thermostat_connected: true
                  setback_active: false
                  schedule_total: 12
                  schedule_active: 11
                  schedule_disabled: 1
                  overrides_active: 2
                  ot_online: true
                  thermostat: true
                  boiler: true
        '503':
          description: OT Direct hardware not available (standard PIC build)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otdirect/mode:
    post:
      security:
        - basicAuth: []
      tags:
        - OT Direct (OTGW32)
      summary: Set OT Direct operating mode
      description: |
        Switch the OTGW32 OT-direct engine to the requested operating mode.
        The command is translated to the equivalent `GW=` command internally.

        Supported modes:

        | Mode | Equivalent | Description |
        |------|------------|-------------|
        | `gateway` | `GW=1` | Full gateway: scheduler + thermostat forwarding + overrides (default) |
        | `monitor` | `GW=0` | Monitor / PIC parity (TASK-438) |
        | `bypass` | `GW=P` | Bypass alias (TASK-438) |
        | `master` | `GW=S` | Sole OT master: scheduler only, no thermostat expected |
        | `loopback` | `GW=L` | Internal loopback test: simulated boiler responses, no hardware needed |

        The response echoes the current status *after* the mode switch command has
        been queued; the `mode` field in the response reflects the new mode.

        **OTGW32 only**  - returns 503 on standard ESP8266+PIC hardware.
      operationId: setOTDirectMode
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - mode
              properties:
                mode:
                  type: string
                  enum: [gateway, monitor, bypass, master, loopback]
                  description: Operating mode to activate
      responses:
        '200':
          description: Mode switch queued; response contains current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTDirectStatus'
        '400':
          description: Invalid mode string, or `mode` parameter missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          examples:
            invalidMode:
              value:
                error:
                  status: 400
                  message: "Invalid mode. Use: gateway, monitor, bypass, master, loopback"
            missingParam:
              value:
                error:
                  status: 400
                  message: "Missing 'mode' parameter"
        '503':
          description: OT Direct hardware not available (standard PIC build)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - OT Direct (OTGW32)
      summary: Set OT Direct operating mode (PUT alias)
      operationId: setOTDirectModePut
      requestBody:
        $ref: '#/paths/~1v2~1otdirect~1mode/post/requestBody'
      responses:
        '200':
          description: Mode switch queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTDirectStatus'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '503':
          description: OT Direct hardware not available
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otdirect/settings:
    get:
      tags:
        - OT Direct (OTGW32)
      summary: Get OT Direct settings
      description: |
        Returns the persisted OT-direct configuration settings.

        **OTGW32 only**  - returns 503 on standard ESP8266+PIC hardware.
      operationId: getOTDirectSettings
      responses:
        '200':
          description: OT Direct settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  otdirect_settings:
                    type: object
                    properties:
                      mode:
                        type: integer
                        description: Persisted mode index (0=bypass, 1=gateway, 2=monitor, 3=master, 4=loopback)
                      setback_temp:
                        type: number
                        description: Setback temperature applied when thermostat disconnects (C, range 1-30)
                        example: 15.0
                      setback_timeout:
                        type: integer
                        description: Seconds without a thermostat frame before setback activates
                        example: 300
                      ch_mode:
                        type: integer
                        description: CH control mode (0=fixed setpoint, 1=heating curve, 2=PI room compensation)
                      flow_temp:
                        type: number
                        description: Fixed flow temperature setpoint (C, used when ch_mode=0)
                      flow_max:
                        type: number
                        description: Maximum flow temperature limit (C)
                      room_setpoint:
                        type: number
                        description: Room temperature setpoint for PI compensation (C)
                      gradient:
                        type: number
                        description: Heating curve gradient
                      exponent:
                        type: number
                        description: Heating curve exponent
                      offset:
                        type: number
                        description: Heating curve offset (C)
                      room_comp:
                        type: boolean
                        description: Whether PI room compensation is enabled
                      kp:
                        type: number
                        description: PI proportional gain
                      ki:
                        type: number
                        description: PI integral gain
                      kboost:
                        type: number
                        description: PI boost gain for large errors
              example:
                otdirect_settings:
                  mode: 1
                  setback_temp: 15.0
                  setback_timeout: 300
                  ch_mode: 0
                  flow_temp: 55.0
                  flow_max: 80.0
                  room_setpoint: 20.0
                  gradient: 1.5
                  exponent: 1.3
                  offset: 0.0
                  room_comp: false
                  kp: 2.0
                  ki: 0.001
                  kboost: 5.0
        '503':
          description: OT Direct hardware not available (standard PIC build)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      security:
        - basicAuth: []
      tags:
        - OT Direct (OTGW32)
      summary: Update OT Direct settings
      description: |
        Update one or both OT-direct settings. Only provided parameters are updated.
        Returns the current full OT-direct status after the update.

        **OTGW32 only**  - returns 503 on standard ESP8266+PIC hardware.
      operationId: updateOTDirectSettings
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                setbacktemp:
                  type: string
                  description: Setback temperature in C (range 1.0-30.0)
                  example: "15.0"
                setbacktimeout:
                  type: string
                  description: Setback timeout in seconds
                  example: "300"
                chmode:
                  type: string
                  description: CH control mode (0=fixed, 1=heating curve, 2=PI room comp)
                flowtemp:
                  type: string
                  description: Fixed flow temperature setpoint (C)
                flowmax:
                  type: string
                  description: Maximum flow temperature limit (C)
                roomsetpoint:
                  type: string
                  description: Room setpoint for PI compensation (C)
                gradient:
                  type: string
                  description: Heating curve gradient
                exponent:
                  type: string
                  description: Heating curve exponent
                offset:
                  type: string
                  description: Heating curve offset (C)
                roomcomp:
                  type: string
                  description: PI room compensation enabled (true/false)
                kp:
                  type: string
                  description: PI proportional gain
                ki:
                  type: string
                  description: PI integral gain
                kboost:
                  type: string
                  description: PI boost gain
      responses:
        '200':
          description: Settings updated; response contains current full OT-direct status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTDirectStatus'
        '503':
          description: OT Direct hardware not available (standard PIC build)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - OT Direct (OTGW32)
      summary: Update OT Direct settings (PUT alias)
      operationId: updateOTDirectSettingsPut
      requestBody:
        $ref: '#/paths/~1v2~1otdirect~1settings/post/requestBody'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTDirectStatus'
        '503':
          description: OT Direct hardware not available
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/otdirect/overrides:
    get:
      tags:
        - OT Direct (OTGW32)
      summary: Get active OT Direct overrides
      description: |
        Returns all currently active write overrides and response overrides in the
        OT-direct engine as a JSON object.

        **OTGW32 only**  - returns 503 on standard ESP8266+PIC hardware.
      operationId: getOTDirectOverrides
      responses:
        '200':
          description: Override list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                description: |
                  JSON object containing override lists. Structure defined by
                  `getOTDirectOverridesJSON()` in `OTDirect.ino`.
        '503':
          description: OT Direct hardware not available (standard PIC build)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      security:
        - basicAuth: []
      tags:
        - OT Direct (OTGW32)
      summary: Manage OT Direct overrides
      description: |
        Add, clear, or manage override entries in the OT-direct engine.
        All actions require `msgid` (0-127). Actions `sr` and `rm` additionally
        require `value` (4-hex-digit data word).

        | Action | OT command | Description |
        |--------|------------|-------------|
        | `sr` | `SR=MsgID:HHHH` | Set stored response  - gateway answers thermostat with fixed data for this MsgID |
        | `cr` | `CR=MsgID` | Clear stored response |
        | `rm` | `RM=MsgID:HHHH` | Set response modifier  - modify boiler→thermostat response data for this MsgID |
        | `cm` | `CM=MsgID` | Clear response modifier |
        | `ui` | `UI=MsgID` | Mark MsgID as unknown  - gateway responds UNKNOWN_DATAID to thermostat |
        | `ki` | `KI=MsgID` | Mark MsgID as known again  - restore normal forwarding |

        Returns the updated override list after the command is queued.

        **OTGW32 only**  - returns 503 on standard ESP8266+PIC hardware.
      operationId: manageOTDirectOverrides
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - action
                - msgid
              properties:
                action:
                  type: string
                  enum: [sr, cr, rm, cm, ui, ki]
                  description: Override action to perform
                msgid:
                  type: integer
                  minimum: 0
                  maximum: 127
                  description: OpenTherm Message ID (0-127)
                value:
                  type: string
                  pattern: '^[0-9A-Fa-f]{4}$'
                  description: 4-hex-digit data word (required for `sr` and `rm` actions)
                  example: "3C00"
      responses:
        '200':
          description: Override command queued; response contains updated override list
          content:
            application/json:
              schema:
                type: object
                description: Updated override list
        '400':
          description: |
            Invalid or missing parameters. Possible causes:
            - `action` parameter missing or not one of the valid values
            - `msgid` missing or out of range (0-127)
            - `value` missing for `sr` or `rm` actions
            - `value` format invalid (must be exactly 4 hex digits)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '503':
          description: OT Direct hardware not available (standard PIC build)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - OT Direct (OTGW32)
      summary: Manage OT Direct overrides (PUT alias)
      operationId: manageOTDirectOverridesPut
      requestBody:
        $ref: '#/paths/~1v2~1otdirect~1overrides/post/requestBody'
      responses:
        '200':
          description: Override command queued
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '503':
          description: OT Direct hardware not available
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

