        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/pvsurplus:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Push PV-surplus power (TASK-640)
      description: |
        Injects a PV-surplus power reading in Watts. When the surplus exceeds the
        configured threshold for the hold-time and feature is enabled
        (`satpvboostenabled`), SAT applies an additive boost of
        `satpvboostdeltac` °C to the effective target. Reading expires after
        `sensor_max_age` (default 6 h). Body is a plain numeric string or JSON
        `{"value":"1800"}`. Range: 0 to 50000 W.
      operationId: setSatPvSurplus
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "1800"
      responses:
        '200':
          description: PV-surplus value accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/sim/event:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Inject a simulation scenario event (TASK-797)
      description: |
        Perturbs the synthetic room model so testers can exercise SAT responses
        on a bench without real hardware. Honoured ONLY while simulation is
        active (`satsimulation` enabled); returns HTTP 409 otherwise, so it can
        never perturb a real-boiler installation.

        Supported events:
        - `window_open` — multiplies the room cooling rate for `duration_s`.
          `value` = loss multiplier (default 3, clamped 1..20).
        - `solar_gain` — additive room warming for `duration_s`.
          `value` = °C/min (default 0.5, clamped 0..5).
        - `sensor_noise` — adds ± noise to flow/return sensor reads for
          `duration_s` (TASK-799), exercising staleness/EMA paths. `value` =
          amplitude °C (default 0.5, clamped 0..5); `value` 0 turns noise off.
        - `sensor_dropout` — drops the room sensor (room read returns NAN) for
          `duration_s` (TASK-799), exercising the ghost-Tr / fallback path.
          `value` 0 with no duration cancels an active dropout.
        - `dhw_demand` — triggers a DHW draw for `duration_s` (default 120 s,
          TASK-800): forces DHW-active (flame-steal, CH suppressed) so the cycle
          classifier sees DHW/MIXED cycles. `value` 0 + no duration cancels.

        `duration_s` is optional (default 600 s; 120 s for `dhw_demand`).
        `pressure_drop` is deferred (SATpressure coupling); `pv_surplus` has its
        own `/v2/sat/pvsurplus` endpoint. Unknown/unsupported events return 400.
      operationId: injectSatSimEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  type: string
                  enum: [window_open, solar_gain, sensor_noise, sensor_dropout, dhw_demand]
                  example: window_open
                value:
                  type: number
                  example: 3
                duration_s:
                  type: integer
                  example: 600
      responses:
        '200':
          description: Scenario event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '409':
          description: Simulation inactive — enable satsimulation first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/sat/reset_integral:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Reset PID integral accumulator
      description: |
        Resets the PID I-term to zero. Useful after large setpoint changes to
        prevent integral windup from causing overshoot.
      operationId: satResetIntegral
      responses:
        '200':
          description: Integral reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/flush:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Flush short-lived SAT data
      description: |
        Clears short-lived SAT data including the PID integral accumulator and
        cycle statistics window. Useful after large configuration changes or
        when troubleshooting control behavior.
      operationId: satFlush
      responses:
        '200':
          description: Data flushed
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    enum: [ok]
                  flushed:
                    type: array
                    items:
                      type: string
              example:
                result: ok
                flushed: ["pid", "cycles"]
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/window:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Set window open/closed state
      description: |
        Reports window open/closed state to SAT. When a window is open, SAT
        reduces the setpoint to avoid heating a ventilated room. Payload:
        `"open"`, `"closed"`, `"1"`, `"0"`, or `"ON"`.
      operationId: setSatWindow
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "open"
      responses:
        '200':
          description: Window state accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/preset:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Activate a named preset
      description: |
        Switches the SAT target temperature to the configured value for the named
        preset. Valid preset names: `comfort`, `eco`, `away`, `sleep`, `activity`, `home`.
      operationId: setSatPreset
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              enum: [comfort, eco, away, sleep, activity, home]
              example: "away"
      responses:
        '200':
          description: Preset activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/enable:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Enable or disable SAT controller
      description: |
        Enables or disables the SAT controller. Payload: `"1"`, `"true"`, `"on"` to enable;
        `"0"`, `"false"`, `"off"` to disable.
      operationId: setSatEnable
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "1"
      responses:
        '200':
          description: SAT enabled/disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/mode:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Set SAT control mode
      description: |
        Sets the SAT control mode. Valid values: `"continuous"`, `"pwm"`, `"auto"`,
        or the numeric equivalents `"0"`, `"1"`, `"2"`.
      operationId: setSatMode
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              enum: [continuous, pwm, auto, "0", "1", "2"]
              example: "continuous"
      responses:
        '200':
          description: Control mode set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/humidity:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Push indoor humidity
      description: |
        Injects an indoor humidity reading (0-100 %). Used when humidity-based comfort
        adjustment is enabled. Body is a plain numeric string or JSON `{"value":"62.5"}`.
      operationId: setSatHumidity
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "62.5"
      responses:
        '200':
          description: Humidity accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/weather:
    get:
      tags:
        - SAT
      summary: Get weather integration status
      description: |
        Returns the current weather integration status as a JSON object, including
        the last received sun elevation and outdoor temperature from the weather source.
      operationId: getSatWeather
      responses:
        '200':
          description: Weather integration status
          content:
            application/json:
              schema:
                type: object
                description: Weather integration state (fields vary by implementation)
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/area/{index}:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Push area temperature for multi-area control
      description: |
        Injects a temperature reading for the specified area (0-3). When multi-area
        mode is enabled, SAT averages (or weights) the area temperatures as the room
        temperature input for the PID. Body is a plain numeric string or JSON `{"value":"21.3"}`.
      operationId: setSatAreaTemp
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 3
          description: Area index (0-3)
          example: 0
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "21.3"
      responses:
        '200':
          description: Area temperature accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/weather/needs-setup:
    get:
      tags:
        - SAT
      summary: Report whether the weather setup wizard should be shown
      description: |
        Returns whether the browser-side weather setup wizard should be
        triggered (TASK-511). Becomes `true` only after a 5-minute startup
        grace window AND when the canonical outside temperature
        (`OTcurrentSystemState.Toutside`, populated from OT MsgID 27) is
        still zero AND the SAT weather provider has not produced a valid
        reading. The `has_key` field surfaces whether an Open-Meteo /
        provider API key is already stored.
      operationId: getSatWeatherNeedsSetup
      responses:
        '200':
          description: Setup status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  needs_setup:
                    type: boolean
                  has_key:
                    type: boolean
              example:
                needs_setup: false
                has_key: true
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/discovery:
    get:
      tags:
        - SAT
      summary: BLE sensor roster (ESP32 only)
      description: |
        Streams the BLE roster as JSON (TASK-508). Each roster slot lists the
        discovered MAC, persistent label, last temperature/humidity, RSSI,
        and selection state. ESP32-only endpoint; the entire `/v2/sat/ble/*`
        family returns 404 from the SAT handler on ESP8266 builds.
      operationId: getSatBleDiscovery
      responses:
        '200':
          description: Roster retrieved successfully
          content:
            application/json:
              schema:
                type: object
                description: Roster payload as produced by `satBLERosterSendJSON()`.
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/select:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Promote a roster MAC to the active BLE sensor (ESP32 only)
      description: |
        Promotes the named MAC from the roster to the active SAT BLE sensor
        slot (TASK-508). The MAC must already be present in the roster from
        a prior discovery cycle.
      operationId: setSatBleSelect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mac]
              properties:
                mac:
                  type: string
                  example: "AA:BB:CC:DD:EE:FF"
      responses:
        '200':
          description: Roster slot selected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Promote a roster MAC (PUT alias)
      operationId: setSatBleSelectPut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1select/post/requestBody'
      responses:
        '200':
          description: Roster slot selected
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/label:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Set the persistent label on a roster slot (ESP32 only)
      description: |
        Updates the user-visible label for the named MAC in the BLE roster
        (TASK-508). Label is persisted alongside the roster slot.
      operationId: setSatBleLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mac, label]
              properties:
                mac:
                  type: string
                  example: "AA:BB:CC:DD:EE:FF"
                label:
                  type: string
                  maxLength: 31
                  example: "Living room"
      responses:
        '200':
          description: Label updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Set roster label (PUT alias)
      operationId: setSatBleLabelPut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1label/post/requestBody'
      responses:
        '200':
          description: Label updated
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/forget:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Drop a roster slot and its HA discovery (ESP32 only)
      description: |
        Removes the named MAC from the BLE roster and unpublishes the matching
        Home Assistant discovery config (TASK-508). Accepts POST, PUT, or
        DELETE; the body always carries the MAC.
      operationId: forgetSatBle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mac]
              properties:
                mac:
                  type: string
                  example: "AA:BB:CC:DD:EE:FF"
      responses:
        '200':
          description: Roster slot removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Drop a roster slot (PUT alias)
      operationId: forgetSatBlePut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1forget/post/requestBody'
      responses:
        '200':
          description: Roster slot removed
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    delete:
      tags:
        - SAT
      summary: Drop a roster slot (DELETE alias)
      operationId: forgetSatBleDelete
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1forget/post/requestBody'
      responses:
        '200':
          description: Roster slot removed
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: MAC not present in roster
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/ble/roster:
    get:
      tags:
        - SAT
      summary: Get the SAT BLE roster (ESP32 only)
      description: |
        Returns the structured SAT BLE sensor roster (TASK-935/946): the 8 fixed
        slots plus the global name-prefix filter settings. Gated on `HAS_SAT_BLE`;
        returns 404 (`BLE not supported on this build`) on builds without BLE.

        **Bindkeys are write-only.** Each slot reports only `has_bindkey`
        (boolean) — the per-slot bindkey secret is NEVER emitted in the response.
      operationId: getSatBleRoster
      security:
        - basicAuth: []
      responses:
        '200':
          description: Roster retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: Number of populated roster slots
                  name_prefix:
                    type: string
                    description: BLE advertised-name prefix filter
                  name_filter_ingest:
                    type: boolean
                    description: Whether the name-prefix filter is applied on ingest
                  slots:
                    type: array
                    description: Always 8 entries (slot indices 0-7)
                    items:
                      type: object
                      properties:
                        idx:
                          type: integer
                          minimum: 0
                          maximum: 7
                        mac:
                          type: string
                          description: Slot MAC (empty string when unset)
                        label:
                          type: string
                          description: User-visible slot label
                        has_bindkey:
                          type: boolean
                          description: True when a bindkey is stored for this slot (the secret itself is never returned)
        '404':
          description: BLE not supported on this build
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Write a single BLE roster slot (ESP32 only)
      description: |
        Writes one roster slot (TASK-935/946). `idx` is required; at least one of
        `mac`, `label`, or `bindkey` must be provided. Parameters may be sent as
        query string or form body. The response never echoes user-supplied text;
        GET the roster to read values back. Gated on `HAS_SAT_BLE`; returns 404 on
        builds without BLE.

        Validation:
        - `idx` — required integer 0-7 (non-numeric → 400)
        - `mac` — empty (clears) or a 17-char colon-hex address `AA:BB:CC:DD:EE:FF` (else 400)
        - `label` — optional free text
        - `bindkey` — empty (clears) or exactly 32 hex characters (else 400); write-only
      operationId: setSatBleRosterSlot
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - idx
              properties:
                idx:
                  type: integer
                  minimum: 0
                  maximum: 7
                mac:
                  type: string
                  pattern: '^(([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2})?$'
                  description: 17-char colon-hex MAC, or empty string to clear
                label:
                  type: string
                bindkey:
                  type: string
                  pattern: '^([0-9A-Fa-f]{32})?$'
                  description: Exactly 32 hex characters, or empty string to clear (write-only)
      responses:
        '200':
          description: Slot written
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  idx:
                    type: integer
                  has_bindkey:
                    type: boolean
              example:
                status: ok
                idx: 0
                has_bindkey: true
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: BLE not supported on this build
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Write a single BLE roster slot (POST alias)
      operationId: setSatBleRosterSlotPost
      requestBody:
        $ref: '#/paths/~1v2~1sat~1ble~1roster/put/requestBody'
      responses:
        '200':
          description: Slot written
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: BLE not supported on this build
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    delete:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Clear a single BLE roster slot (ESP32 only)
      description: |
        Clears the roster slot identified by `idx` (required integer 0-7;
        non-numeric → 400). Gated on `HAS_SAT_BLE`; returns 404 on builds
        without BLE.
      operationId: clearSatBleRosterSlot
      parameters:
        - name: idx
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 7
      responses:
        '200':
          description: Slot cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [cleared]
              example:
                status: "cleared"
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: BLE not supported on this build
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/markers:
    get:
      tags:
        - SAT
      summary: List heating-curve calibration markers
      description: |
        Returns the heating-curve calibration markers persisted to
        `/sat_markers.json` (TASK-586). Each marker is an object with
        `id`, `outside_temp`, `flow_temp`, `added` (unix epoch), and
        optional `label`. Returns an empty JSON array when the file does
        not yet exist.
      operationId: listSatMarkers
      responses:
        '200':
          description: Marker list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    outside_temp:
                      type: number
                    flow_temp:
                      type: number
                    added:
                      type: integer
                      description: Unix epoch when the marker was created
                    label:
                      type: string
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Add a heating-curve calibration marker
      description: |
        Appends a marker to `/sat_markers.json` (TASK-586). The store keeps
        at most 20 markers; a 409 is returned when the limit is reached. The
        new `id` is `max(existing_id) + 1`. The `added` timestamp is the
        current epoch when the marker is written.
      operationId: addSatMarker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outside_temp, flow_temp]
              properties:
                outside_temp:
                  type: number
                  minimum: -15
                  maximum: 25
                flow_temp:
                  type: number
                  minimum: 10
                  maximum: 90
                label:
                  type: string
                  maxLength: 31
      responses:
        '201':
          description: Marker created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  id:
                    type: integer
              example:
                status: ok
                id: 4
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '409':
          description: Marker store is full (20 markers maximum)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '500':
          description: Cannot write `/sat_markers.json` to LittleFS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/sat/markers/{id}:
    delete:
      tags:
        - SAT
      summary: Delete a heating-curve calibration marker
      description: |
        Removes the marker with the given numeric `id` from
        `/sat_markers.json` (TASK-586).
      operationId: deleteSatMarker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Marker removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '404':
          description: Marker id not found, or the markers file does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
        '500':
          description: Cannot write `/sat_markers.json` to LittleFS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /v2/sat/sensor-areas:
    get:
      tags:
        - SAT
      summary: Get Dallas-to-SAT-area mapping
      description: |
        Returns the persistent mapping of Dallas 1-Wire sensor addresses to
        the four SAT area slots (TASK-587). An empty `sensor` string means
        the slot is unmapped. Addresses are 16 uppercase hex characters.
      operationId: getSatSensorAreas
      responses:
        '200':
          description: Mapping retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  areas:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                          minimum: 0
                          maximum: 3
                        sensor:
                          type: string
                          description: 16-hex-character Dallas address or empty string
              example:
                areas:
                  - index: 0
                    sensor: "28FF64D1841703F1"
                  - index: 1
                    sensor: ""
                  - index: 2
                    sensor: ""
                  - index: 3
                    sensor: ""
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    patch:
      tags:
        - SAT
      summary: Update one Dallas-to-SAT-area mapping
      description: |
        Updates one of the four mapping slots (TASK-587). The body specifies
        the slot `area` (0-3) and the Dallas sensor address. An empty string
        clears the slot. Addresses are validated as 16 hex characters and
        normalised to uppercase before persistence. Also accepts POST and
        PUT for browsers that cannot issue PATCH.
      operationId: setSatSensorArea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [area]
              properties:
                area:
                  type: integer
                  minimum: 0
                  maximum: 3
                sensor:
                  type: string
                  pattern: '^([0-9A-Fa-f]{16})?$'
                  description: 16-hex-character Dallas address, or empty string to clear the slot
      responses:
        '200':
          description: Mapping updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Update one Dallas-to-SAT-area mapping (POST alias)
      operationId: setSatSensorAreaPost
      requestBody:
        $ref: '#/paths/~1v2~1sat~1sensor-areas/patch/requestBody'
      responses:
        '200':
          description: Mapping updated
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'
    put:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Update one Dallas-to-SAT-area mapping (PUT alias)
      operationId: setSatSensorAreaPut
      requestBody:
        $ref: '#/paths/~1v2~1sat~1sensor-areas/patch/requestBody'
      responses:
        '200':
          description: Mapping updated
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

  /v2/sat/settings/{name}:
    post:
      security:
        - basicAuth: []
      tags:
        - SAT
      summary: Update a SAT setting
      description: |
        Updates any named SAT setting. This mirrors all MQTT `sat/<name>` command
        handlers. The setting name corresponds to the MQTT subtopic (e.g.,
        `heating_curve`, `deadband`, `boiler_capacity`, `heating_system`,
        `overshoot_margin`, `manufacturer`, `simulation`, `auto_tune`, etc.).

        Special no-value commands (`reset_integral`, `ovp_start`, `ovp_stop`) are
        also accepted here without a body.

        See the [SAT MQTT topics reference](https://github.com/rvdbreemen/OTGW-firmware/blob/dev/backlog/docs/doc-1%20-%20sat-mqtt-topics.md)
        for the full list of setting names and valid payload formats.
      operationId: setSatSetting
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: SAT setting name (e.g., `heating_curve`, `deadband`, `boiler_capacity`)
          example: "heating_curve"
      requestBody:
        required: false
        content:
          text/plain:
            schema:
              type: string
              example: "1.5"
      responses:
        '200':
          description: Setting updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequestJson'
        '405':
          $ref: '#/components/responses/MethodNotAllowedJson'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic Auth on protected/admin routes (ADR-056). Active ONLY when an
        HTTP password is configured; with no password set the device accepts the
        request without credentials (trusted-LAN model). Username is "admin".
  schemas:
    SensorStatus:
      type: object
      description: |
        Hardware sensor status. Returned by `GET /v2/sensors` and `GET /v2/sensors/status`.
      properties:
        sensors:
          type: object
          properties:
            dallas_enabled:
              type: boolean
              description: Whether Dallas 1-Wire temperature sensors are enabled in settings
            dallas_detected:
              type: boolean
              description: Whether at least one Dallas sensor was detected on the bus
            dallas_count:
              type: integer
              description: Number of detected Dallas sensors
            dallas_gpio:
              type: integer
              description: GPIO pin used for the 1-Wire bus
            dallas_poll_sec:
              type: integer
              description: Sensor polling interval in seconds
            simulated:
              type: boolean
              description: Whether sensor simulation mode is active (state.debug.bSensorSim)
            devices:
              type: object
              description: |
                Per-device readings. Only present when sensors are detected or simulation is active.
                Keys are 1-Wire addresses (16 hex characters); values are objects with `temp` (float, °C)
                and `epoch` (uint32, seconds since boot).
              additionalProperties:
                type: object
                properties:
                  temp:
                    type: number
                    description: Temperature in °C
                  epoch:
                    type: integer
                    description: Timestamp of last reading (seconds since boot)
            s0:
              type: object
              description: S0 pulse counter state
              properties:
                enabled:
                  type: boolean
                gpio:
                  type: integer
                  description: GPIO pin for S0 input
                poll_sec:
                  type: integer
                  description: S0 reporting interval in seconds
                pulses:
                  type: integer
                  description: Pulse count in the current interval
                total:
                  type: integer
                  description: Total pulse count since boot
                power_kw:
                  type: number
                  description: Calculated power in kW
                epoch:
                  type: integer
                  description: Timestamp of last pulse (seconds since boot)

    StatusOk:
      type: object
      description: Standard success response for SAT write operations
      properties:
        status:
          type: string
          enum: [ok]
      example:
        status: ok

    SatStatus:
      type: object
      description: |
        SAT runtime status as a flat JSON object (no wrapper). Returned by
        `GET /v2/sat/status`. Contains 132 fields covering control mode,
        setpoints, PID state, temperature sensors, cycle diagnostics, pressure,
        power, thermal model, comfort, and BLE inputs. Field set may grow as the
        SAT engine evolves; consumers must ignore unknown keys. Add
        `?detail=full` for the compact health view (see `SatHealth`).
      properties:
        enabled:
          type: boolean
          description: "SAT control loop enabled"
        active:
          type: boolean
          description: "SAT actively driving the boiler setpoint"
        control_mode:
          type: integer
          description: "Control mode (0=off, 1=continuous, 2=PWM)"
        boiler_status:
          type: string
          description: "Boiler status label (off/idle/preheating/at_setpoint/modulating/etc.)"
        target_temp:
          type: number
          description: "Target room temperature (C)"
        room_temp:
          type: [number, "null"]
          description: "Room temperature used by the PID (C); null when no sensor"
        outside_temp:
          type: [number, "null"]
          description: "Outside temperature used by the heating curve (C); null when no OT-bus/external/weather source"
        heating_curve:
          type: number
          description: "Heating-curve flow temperature (C)"
        pid_output:
          type: number
          description: "PID output = curve + P + I + D (C)"
        final_setpoint:
          type: [number, "null"]
          description: "Final flow setpoint sent to the boiler (C); null when SAT is not active"
        error:
          type: number
          description: "PID error = target - room (C)"
        pid_p:
          type: number
          description: "Proportional PID term (C)"
        pid_i:
          type: number
          description: "Integral PID term (C)"
        pid_d:
          type: number
          description: "Derivative PID term (C)"
        kp:
          type: number
          description: "Active Kp gain"
        ki:
          type: number
          description: "Active Ki gain"
        kd:
          type: number
          description: "Active Kd gain"
        raw_derivative:
          type: number
          description: "Raw (unfiltered) derivative of the error"
        coefficient:
          type: number
          description: "Heating-curve coefficient (steepness)"
        deadband:
          type: number
          description: "PID deadband (C) around the target"
        overshoot_margin:
          type: number
          description: "Allowed overshoot above target before a cycle is classed as overshoot (C)"
        cycle_count:
          type: integer
          description: "Total boiler cycles counted"
        cycles_this_hour:
          type: integer
          description: "Boiler cycles in the trailing hour"
        last_cycle_class:
          type: integer
          description: "Last cycle classification code (0=none,1=good,2=overshoot,3=underheat,4=short,5=uncertain)"
        cycle_max_flow:
          type: number
          description: "Peak flow temperature in the current/last cycle (C)"
        cycle_overshoot_sec:
