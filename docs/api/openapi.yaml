                        description: Always "***" regardless of actual password
                        example: "***"
                      settings.mqtt.toptopic:
                        type: string
                      settings.mqtt.ha_prefix:
                        type: string
                      settings.mqtt.unique_id:
                        type: string
                      settings.mqtt.interval:
                        type: integer
                      settings.mqtt.enabled:
                        type: boolean
                      settings.mqtt.disc_verify:
                        type: boolean
                      settings.mqtt.sep_src:
                        type: boolean
                      settings.legacy.port_25238:
                        type: boolean
                        description: Legacy TCP port 25238 enabled
                      settings.ntp.server:
                        type: string
                      settings.ntp.tz:
                        type: string
                      settings.ntp.enabled:
                        type: boolean
                      settings.sensors.enabled:
