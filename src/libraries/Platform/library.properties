sentence=ESP8266/ESP32 platform abstraction layer for OTGW-firmware.
paragraph=Single include surface (platform.h) that resolves all ESP8266/ESP32 differences behind platformXxx() shims, plus boards.h capability flags (HAS_*) and per-platform pin maps. Application code includes <platform.h> / <boards.h> and never branches on raw ESP8266/ESP32 preprocessor symbols. The OTGW-ModUpdateServer trio remains in the application tier; see ADR-119.
