<!DOCTYPE HTML>
<html lang="en">
   <head>
      <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
      <link rel="stylesheet" type="text/css" href="ds-tokens.css">
      <!-- TASK-435 follow-up A: same theme model as index.html. Pre-paint
           data-theme on <html> for the first frame; components.css carries
           both light baseline and body.dark / [data-theme="dark"] overrides
           so no stylesheet swap is needed. -->
      <script>
        (function() {
          try {
            var stored = localStorage.getItem('theme');
            var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            var isDark = (stored === 'dark') || (!stored && prefersDark);
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            if (isDark) document.body && document.body.classList.add('dark');
          } catch (e) { /* ignore */ }
        })();
      </script>
      <link rel="stylesheet" type="text/css" href="components.css">
      <title>FSexplorer ESP</title>
      <script>
         let currentPath = '/';

         function formatBytes(bytes) {
             if (bytes < 1024) return bytes + ' Byte';
             if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
             return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
         }

         document.addEventListener('DOMContentLoaded', () => {
             let main = document.querySelector('main');
             let fileSize = document.querySelector('fileSize');
             let fileInput = document.querySelector('input[name="upload"]');
             let uploadBtn = document.querySelector('input[value="Upload"]');
             let uploadForm = document.querySelector('form[action="/upload"]');
             let freeBytes = 0;

             // Create progress bar
             let progressBar = document.createElement('progress');
             progressBar.max = 100;
             progressBar.value = 0;
             progressBar.style.display = 'none';
             progressBar.style.width = '200px';
             progressBar.style.verticalAlign = 'middle';
             uploadForm.appendChild(progressBar);

             function toggleInteraction(disable) {
                 const elements = document.querySelectorAll('input, button, select, textarea, a');
                 elements.forEach(el => {
                     if (disable) {
                         if (el.tagName === 'A') {
                             el.style.pointerEvents = 'none';
                             el.style.opacity = '0.5';
                         } else {
                             if (el.disabled) el.setAttribute('data-disabled', 'true');
                             el.disabled = true;
                         }
                     } else {
                         if (el.tagName === 'A') {
                             el.style.pointerEvents = 'auto';
                             el.style.opacity = '1';
                         } else {
                             if (el.getAttribute('data-disabled') === 'true') {
                                 el.removeAttribute('data-disabled');
                             } else {
                                 el.disabled = false;
                             }
                         }
                     }
                 });
             }

             function loadFileList(highlightFile = null) {
                 uploadForm.action = '/upload?path=' + encodeURIComponent(currentPath);
                 
                 fetch('api/listfiles?path=' + encodeURIComponent(currentPath))
                   .then(function (response) {
                     if (!response.ok) {
                       throw new Error('HTTP ' + response.status);
                     }
                     return response.json();
                   })
                   .then(function (json) {
                     main.innerHTML = '';

                     // Split storage info (last entry) from file entries
                     var storageEntry = json.length > 0 ? json[json.length - 1] : null;
                     var files = json.slice(0, -1);

                     // LittleFS removes empty directories automatically.
                     // If the directory is gone, navigate back to root.
                     if (files.length === 0 && currentPath !== '/') {
                       currentPath = '/';
                       loadFileList();
                       return;
                     }

                     // Sort: directories first, then alphabetical (case-insensitive)
                     files.sort(function(a, b) {
                       if (a.type === 'dir' && b.type !== 'dir') return -1;
                       if (a.type !== 'dir' && b.type === 'dir') return 1;
                       return a.name.localeCompare(b.name, undefined, {sensitivity: 'base'});
                     });

                     const table = document.createElement('table');
                     table.style.width = '90%';

                     const headerRow = table.insertRow();
                     const headerCell = headerRow.insertCell();
                     headerCell.colSpan = 6;
                     const headerBold = document.createElement('b');
                     headerBold.textContent = 'Current directory: ' + currentPath;
                     headerCell.appendChild(headerBold);

                     if (currentPath !== '/') {
                       const parentRow = table.insertRow();
                       const nameCell = parentRow.insertCell();
                       nameCell.width = '20%';
                       nameCell.setAttribute('nowrap', '');
                       const parentBold = document.createElement('b');
                       const parentLink = document.createElement('a');
                       parentLink.href = '#';
                       parentLink.className = 'dir-link';
                       parentLink.setAttribute('data-name', '..');
                       parentLink.textContent = '.. (Parent)';
                       parentBold.appendChild(parentLink);
                       nameCell.appendChild(parentBold);

                       const typeCell = parentRow.insertCell();
                       typeCell.width = '10%';
                       typeCell.setAttribute('nowrap', '');
                       typeCell.textContent = '<DIR>';
                       for (let j = 0; j < 4; j++) {
                         const cell = parentRow.insertCell();
                         cell.width = (j === 3) ? '40%' : '10%';
                         cell.setAttribute('nowrap', '');
                       }
                     }

                     for (var i = 0; i < files.length; i++) {
                       const row = table.insertRow();
                       if (highlightFile && files[i].name === highlightFile) {
                         row.style.backgroundColor = '#d4edda';
                       }

                       let fullPath = currentPath === '/' ? files[i].name : currentPath + '/' + files[i].name;
                       if (currentPath !== '/' && !fullPath.startsWith('/')) fullPath = '/' + fullPath;

                       if (files[i].type === 'dir') {
                         const nameCell = row.insertCell();
                         nameCell.width = '20%';
                         nameCell.setAttribute('nowrap', '');
                         const dirBold = document.createElement('b');
                         const dirLink = document.createElement('a');
                         dirLink.href = '#';
                         dirLink.className = 'dir-link';
                         dirLink.setAttribute('data-name', files[i].name);
                         dirLink.textContent = files[i].name + '/';
                         dirBold.appendChild(dirLink);
                         nameCell.appendChild(dirBold);

                         const typeCell = row.insertCell();
                         typeCell.width = '10%';
                         typeCell.setAttribute('nowrap', '');
                         typeCell.textContent = '<DIR>';
                         for (let j = 0; j < 2; j++) {
                           const cell = row.insertCell();
                           cell.width = '10%';
                           cell.setAttribute('nowrap', '');
                         }
                       } else {
                         const nameCell = row.insertCell();
                         nameCell.width = '20%';
                         nameCell.setAttribute('nowrap', '');
                         const fileLink = document.createElement('a');
                         fileLink.href = fullPath;
                         fileLink.target = '_blank';
                         fileLink.textContent = files[i].name;
                         nameCell.appendChild(fileLink);

                         const sizeCell = row.insertCell();
                         sizeCell.width = '10%';
                         sizeCell.setAttribute('nowrap', '');
                         const sizeSmall = document.createElement('small');
                         sizeSmall.textContent = formatBytes(files[i].size);
                         sizeCell.appendChild(sizeSmall);

                         const downloadCell = row.insertCell();
                         downloadCell.width = '10%';
                         downloadCell.setAttribute('nowrap', '');
                         const downloadLink = document.createElement('a');
                         downloadLink.href = fullPath;
                         downloadLink.download = files[i].name;
                         downloadLink.textContent = ' Download ';
                         downloadCell.appendChild(downloadLink);

                         const deleteCell = row.insertCell();
                         deleteCell.width = '10%';
                         deleteCell.setAttribute('nowrap', '');

                         const protectedFiles = ['FSexplorer.html', 'FSexplorer.png',
                                                 'index.html', 'index.js',
                                                 'index_common.css', 'components.css',
                                                 'ds-tokens.css', 'graph.js',
                                                 'design.html', 'favicon.ico',
                                                 'settings.png',
                                                 'inter-400.woff2', 'inter-700.woff2',
                                                 'jetbrains-mono-400.woff2'];
                         if (!protectedFiles.includes(files[i].name)) {
                           const deleteLink = document.createElement('a');
                           deleteLink.href = '#';
                           deleteLink.setAttribute('data-href', fullPath);
                           deleteLink.className = 'delete-link';
                           deleteLink.textContent = ' Delete ';
                           deleteCell.appendChild(deleteLink);
                         }
                       }

                       const spacerCell = row.insertCell();
                       spacerCell.width = '40%';
                       spacerCell.setAttribute('nowrap', '');
                     }

                     main.appendChild(table);

                     document.querySelectorAll('.dir-link').forEach((node) => {
                       node.addEventListener('click', (event) => {
                         event.preventDefault();
                         let name = node.getAttribute('data-name');
                         if (name === '..') {
                           let parts = currentPath.split('/');
                           parts.pop();
                           if (parts.length <= 1) currentPath = '/';
                           else currentPath = parts.join('/');
                           if (currentPath === '') currentPath = '/';
                         } else {
                           if (currentPath === '/') currentPath = '/' + name;
                           else currentPath = currentPath + '/' + name;
                         }
                         loadFileList();
                       });
                     });

                     document.querySelectorAll('.delete-link').forEach((node) => {
                       node.addEventListener('click', (event) => {
                         event.preventDefault();
                         let href = node.getAttribute('data-href');

                         fetch('api/listfiles?delete=' + encodeURIComponent(href))
                           .then(res => {
                             if (!res.ok) {
                               throw new Error('HTTP ' + res.status);
                             }
                             loadFileList();
                           })
                           .catch(error => {
                             console.error('Delete failed:', error);
                             alert('Failed to delete file');
                           });
                       });
                     });

                     if (storageEntry && storageEntry.usedBytes !== undefined) {
                       if (storageEntry.truncated) {
                         const warning = document.createElement('p');
                         warning.style.color = 'orange';
                         warning.textContent = 'Not all files shown (directory has more entries).';
                         main.appendChild(warning);
                       }
                       const storageInfo = document.createElement('p');
                       const boldTag = document.createElement('b');
                       boldTag.textContent = 'LittleFS';
                       storageInfo.appendChild(boldTag);
                       storageInfo.appendChild(document.createTextNode(
                         ' used ' + formatBytes(storageEntry.usedBytes) + ' of ' + formatBytes(storageEntry.totalBytes)));
                       main.appendChild(storageInfo);
                       freeBytes = storageEntry.freeBytes;
                     }

                     if (fileSize) fileSize.textContent = ' ';
                   })
                   .catch(function(error) {
                     console.error('Error loading file list:', error);
                     main.innerHTML = '';
                     const errorMsg = document.createElement('p');
                     errorMsg.style.color = 'red';
                     errorMsg.textContent = 'Error loading file list. Please try again.';
                     main.appendChild(errorMsg);
                   });
             }

             loadFileList();

             fileInput.addEventListener('change', () => {
                 if (!fileInput.files.length) return;
                 let nBytes = fileInput.files[0].size, output = `${nBytes} Byte`;
                 for (var aMultiples = [
                     ' KB',
                     ' MB'
                    ], i = 0, nApprox = nBytes / 1024; nApprox > 1; nApprox /= 1024, i++) {
                      output = nApprox.toFixed(2) + aMultiples[i];
                    }
                    if (nBytes > freeBytes) {
                      if (fileSize) {
                        fileSize.innerHTML = '';
                        const small = document.createElement('small');
                        small.textContent = ' Filesize : ' + output;
                        const strong = document.createElement('strong');
                        strong.style.color = 'red';
                        strong.textContent = ' not enough space! ';
                        const p = document.createElement('p');
                        p.appendChild(small);
                        p.appendChild(strong);
                        fileSize.appendChild(p);
                      }
                      uploadBtn.setAttribute('disabled', 'disabled');
                    } 
                    else {
                      if (fileSize) {
                        fileSize.innerHTML = '';
                        const p = document.createElement('p');
                        const bold = document.createElement('b');
                        bold.textContent = 'Filesize:';
                        p.appendChild(bold);
                        p.appendChild(document.createTextNode(' ' + output));
                        fileSize.appendChild(p);
                      }
                      uploadBtn.removeAttribute('disabled');
                    }
             });

             uploadForm.addEventListener('submit', (e) => {
                e.preventDefault();
                let file = fileInput.files[0];
                if(!file) return;

                toggleInteraction(true);

                let formData = new FormData();
                formData.append('upload', file);

                let xhr = new XMLHttpRequest();
                
                uploadBtn.style.display = 'none';
                progressBar.style.display = 'inline-block';
                progressBar.value = 0;
                
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        progressBar.value = (e.loaded / e.total) * 100;
                    }
                });

                xhr.onload = function() {
                    toggleInteraction(false);
                    if (xhr.status == 200) {
                        loadFileList(file.name);
                    } else {
                        alert('Upload failed!');
                    }
                    progressBar.style.display = 'none';
                    uploadBtn.style.display = 'inline-block';
                    uploadBtn.disabled = true;
                    fileInput.value = '';
                };

                xhr.onerror = function() {
                    toggleInteraction(false);
                    alert('Error during upload');
                    progressBar.style.display = 'none';
                    uploadBtn.style.display = 'inline-block';
                };

                xhr.open('POST', '/upload');
                xhr.send(formData);
             });
          });
      </script>
   </head>
   <body>
      <h2>FSexplorer ESP</h2>
      <div>
         <main class="fs-main"></main>
      </div>
      <br>
      
      <fieldset class="upload-box">
        <legend>Upload File</legend>
        <form action="/upload" method="POST" enctype="multipart/form-data">
             <input type="file" name="upload">
             <input type="submit" value="Upload" disabled>
        </form>
        <fileSize></fileSize>
      </fieldset>
      
      <span></span>
      
      <hr>
      <section class="fs-action-card">
           <h3>System Actions</h3>
           <div class="button-row">
                <form action='/update' method='GET' class='desktop-only'>
                  <input type='submit' class='button fs-btn' name='SUBMIT' value='Update Firmware' ENABLED/>
                </form>
                <form action='/ReBoot'>
                  <input type='submit' class='button fs-btn secondary' name='SUBMIT' value='ReBoot'>
                </form>
                <form action='/ResetWireless'>
                  <input type='submit' class='button fs-btn wifi' name='SUBMIT' value='Reset Wireless'>
                </form>
                <form action='/'>
                  <input type='button' class='button fs-btn secondary' value='Exit FSexplorer' onclick="window.location.href='/'">
                </form>
           </div>
      </section>
      <br>
      <div id="left">
         <a href="https://fipsok.de/Projekt/Esp8266-LittleFS-Tab" target="_blank">Admin © 2018 Jens Fleischer</a><br>
         <a href="https://github.com/rvdbreemen/OTGW-firmware" target="_blank">Adaptations © 2021-2026 Robert van den Breemen</a>
      </div>
   </body>
</html>
