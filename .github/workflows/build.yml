name: PlatformIO firmware build

# 4B-H2: PR-time compile gate. Catches build breakage before merge so
# evaluate.py-clean code that nevertheless fails to compile cannot
# silently land. Runs both ESP8266 and ESP32 targets in parallel.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev
      - "1.4.*"
      - "1.5.*"
      - "feature-dev-*"
      - "release/**"

jobs:
  build:
    name: pio run -e ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: [esp8266, esp32]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            .pio/libdeps
          key: pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build
        run: pio run -e ${{ matrix.env }}

      - name: Upload firmware artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}-${{ github.run_id }}
          path: .pio/build/${{ matrix.env }}/firmware.bin
          if-no-files-found: warn
