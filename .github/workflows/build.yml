name: PlatformIO firmware build

# 4B-H2: PR-time compile gate. Catches build breakage before merge so
# evaluate.py-clean code that nevertheless fails to compile cannot
# silently land. Runs all three ESP32-S3 targets in parallel.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev
      - "1.4.*"
      - "1.5.*"
      - "feature-dev-*"
      - "release/**"

jobs:
  build:
    name: pio run -e ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: [esp32, esp32-classic, esp32-combo]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Do NOT fetch submodules recursively here: the read-only `other-projects`
          # reference submodule points at a repo CI cannot access, which aborts the
          # whole checkout. The firmware build only needs the two vendored libraries
          # that aren't already in-tree; init just those below.
          submodules: false

      - name: Init build submodules (skip read-only other-projects reference)
        run: git submodule update --init --recursive src/libraries/OpenTherm src/libraries/SimpleTelnet

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            .pio/libdeps
          key: pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build
        run: pio run -e ${{ matrix.env }}

      - name: Upload firmware artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}-${{ github.run_id }}
          path: .pio/build/${{ matrix.env }}/firmware.bin
          if-no-files-found: warn
